# Standalone Yaver Wear OS app — Gradle JVM + AndroidX config.
# Versions here (and in build.gradle.kts files) may need alignment with the
# toolchain on the build machine; this is a source-only scaffold (not CI-wired).

# Give the Gradle daemon enough heap for AGP + Kotlin + Compose.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX is mandatory for Jetpack Compose + Wear Compose.
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin official code style.
kotlin.code.style=official

# Faster incremental builds.
org.gradle.caching=true
org.gradle.parallel=true
