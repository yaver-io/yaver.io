# Yaver Gateway — Cloudflare Worker (the captive-OpenRouter inference
# proxy for Yaver Premium). Deploy: cd gateway && npx wrangler deploy.
#
# Secrets (NOT here — set with `npx wrangler secret put <NAME>`):
#   GATEWAY_SHARED_SECRET   matches Convex env of the same name
#   ZAI_API_KEY             z.ai (GLM) upstream key
#   DEEPINFRA_API_KEY       DeepInfra upstream key
#
# Public vars are fine in [vars]. Tune ceilings without a redeploy via
# `wrangler secret put` overrides or by editing here + redeploy.

name = "yaver-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
# CONVEX_URL must point at the .convex.site HTTP host (NOT .convex.cloud).
CONVEX_URL = "https://REPLACE-ME.convex.site"
MAX_TOKENS_PER_REQUEST = "4096"
MAX_CENTS_PER_REQUEST = "50"
# Rolling per-user hourly spend cap (COGS cents). "0" or unset = no cap.
MAX_CENTS_PER_HOUR = "500"

# Per-user meter (hourly cap + sub-cent carry). Optional: remove this
# binding + migration and the gateway falls back to per-request metering.
[[durable_objects.bindings]]
name = "USER_METER"
class_name = "UserMeter"

[[migrations]]
tag = "v1"
new_classes = ["UserMeter"]
