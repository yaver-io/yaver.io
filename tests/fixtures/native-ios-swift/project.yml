name: YaverFixture
options:
  bundleIdPrefix: io.yaver.fixture
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

targets:
  YaverFixture:
    type: application
    platform: iOS
    sources:
      - YaverFixture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.yaver.fixture.native-ios-swift
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        SWIFT_VERSION: "5.0"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"

  YaverFixtureTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - YaverFixtureTests
    dependencies:
      - target: YaverFixture
