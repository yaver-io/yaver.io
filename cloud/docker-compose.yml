# Yaver Cloud — managed Hetzner tenant for phone-backend projects.
#
#   docker compose up -d
#
# After `docker compose up`, mobile/CLI can:
#   yaver phone push <slug> --to https://${CLOUD_DOMAIN:-cloud.yaver.io}
# and /phone/projects/receive on this box materialises the project in the
# persistent /data/yaver volume.
#
# Multi-tenancy is enforced by the agent's existing owner-auth middleware:
# each user's projects land under their own SQLite files keyed by slug. For
# a single-tenant beta box, set CLOUD_OWNER_TOKEN to one known token.

services:
  yaver-agent:
    build:
      context: ..
      dockerfile: cloud/Dockerfile
    container_name: yaver-cloud-agent
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${CLOUD_AGENT_PORT:-18081}:18080"
    expose:
      - "18080"
    environment:
      - HOME=/home/yaver
      - YAVER_HOSTNAME=${CLOUD_DOMAIN:-cloud.yaver.io}
    volumes:
      - yaver-data:/home/yaver/.yaver
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /home/yaver/.yaver
        cat > /home/yaver/.yaver/config.json <<EOF
        {
          "auth_token": "${CLOUD_OWNER_TOKEN:?set CLOUD_OWNER_TOKEN in .env}",
          "device_id": "cloud-agent",
          "containerize_host": true
        }
        EOF
        exec yaver serve --debug --no-tls --no-relay --no-quic --port 18080
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  caddy:
    image: caddy:2.8-alpine
    container_name: yaver-cloud-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUD_DOMAIN=${CLOUD_DOMAIN:-cloud.yaver.io}
      - CLOUD_TLS_EMAIL=${CLOUD_TLS_EMAIL:-admin@yaver.io}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - yaver-agent

volumes:
  yaver-data:      # ~/.yaver on the agent — phone-projects, tasks, config
  caddy-data:      # Let's Encrypt certs
  caddy-config:
