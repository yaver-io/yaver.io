; Yaver Connector Box — ESP32-S3 facade firmware
; Build:  pio run            Flash: pio run -t upload      Monitor: pio device monitor
;
; Board: ESP32-S3-WROOM-1U (N8). DevKit-C target works for Rev-A modules build.
; USB-CDC-on-boot is ON so the box enumerates as a serial control port to the phone
; in WIRED mode. Wireless mode brings up a SoftAP + Modbus-TCP/raw-TCP gateway.

[env:yaver-connector-box]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1            ; native USB
    -DARDUINO_USB_CDC_ON_BOOT=1     ; Serial == USB-CDC (control channel in wired mode)
    -DCORE_DEBUG_LEVEL=2
    ; -DBOX_HAS_FT232               ; define if the FT232 raw path is populated (wired data path);
                                    ; when set, the ESP releases RS485 in wired mode so it never
                                    ; fights the FT232 for the bus.
    ; -DBOX_ENABLE_CAN             ; define to enable the TWAI/CAN gateway (SN65HVD230 populated)

; No external libraries required — SoftAP, TCP servers, Modbus-TCP↔RTU gateway,
; INA219/HX711 reads, RS485 framing, and the WS2812 status LED are all implemented
; against the Arduino-ESP32 core (WiFi, HardwareSerial, Wire, neopixelWrite, twai).
lib_deps =

board_build.partitions = default.csv

; ── K2: Wireless RS485 Stick (hardware/yaver-kits) ──────────────────────────
; Same firmware, wireless-only profile: no FT232 raw path, no USB hub, no PD
; source — just the ESP32-S3 SoftAP ⇄ isolated RS485 gateway. BOX_WIRELESS_ONLY
; tells the firmware to skip USB-host/charge logic; the SoftAP + Modbus-TCP/raw-TCP
; + control + companion are identical to the full box.
[env:yaver-rs485-stick]
extends = env:yaver-connector-box
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOX_WIRELESS_ONLY
    -DCORE_DEBUG_LEVEL=2
