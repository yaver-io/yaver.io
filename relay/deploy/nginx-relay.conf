# nginx ↔ yaver-relay (Go) proxy.
#
# Two transports terminate at the same `location /`:
#   - SSE  (text/event-stream over a long-lived HTTP/1.1 response).
#       Needs `Connection: ''` so nginx doesn't add `keep-alive`,
#       buffering off so chunks land in the browser as they arrive.
#   - WebSocket (browser shell PTY at /ws/terminal, Metro HMR, …).
#       Needs `Upgrade: $http_upgrade` + `Connection: upgrade` so
#       the upgrade handshake reaches the Go relay's hijacker.
#
# Earlier this file unconditionally set `Connection: ''` for SSE,
# which silently killed every WebSocket upgrade — the relay's Go
# code never saw the Upgrade header, returned 400 to the browser,
# and the dashboard's web shell modal showed "connection error /
# disconnected" with no clear cause. The map below routes per-
# request: when the client sent `Upgrade: websocket`, $connection_yaver
# becomes `upgrade`; for everything else (SSE / plain HTTP) it stays
# empty and the SSE behavior is preserved.
map $http_upgrade $connection_yaver {
    default upgrade;
    ''      '';
}

server {
    listen 443 ssl http2;
    server_name DOMAIN;

    ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    # Proxy to relay HTTP port
    location / {
        proxy_pass http://127.0.0.1:HTTP_PORT;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade support — forwards the Upgrade header
        # (was absent before; nginx defaults to NOT proxying it).
        # Connection is per-request via $connection_yaver above so
        # SSE keeps its empty Connection while WS gets `upgrade`.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_yaver;

        # SSE/streaming support
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Pass relay password header
        proxy_set_header X-Relay-Password $http_x_relay_password;

        # Long timeouts for SSE streams + WebSocket sessions
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

server {
    listen 80;
    server_name DOMAIN;
    return 301 https://$server_name$request_uri;
}
