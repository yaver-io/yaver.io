services:
  relay:
    build: .
    container_name: yaver-relay
    ports:
      - "4433:4433/udp"
      - "8443:8443/tcp"
    environment:
      - RELAY_PASSWORD=${RELAY_PASSWORD:-}
      # Optional. Set this to your own Convex backend URL if you want
      # per-user `__rp=` password validation against your own Convex
      # deployment (e.g. you're running your own Yaver fleet). Leave
      # empty for shared-password-only mode (the relay accepts any
      # request whose `__rp` matches RELAY_PASSWORD). DO NOT point at
      # https://perceptive-minnow-557.eu-west-1.convex.site — that's
      # Yaver's production backend; your users' passwords aren't there
      # so every request would 401. The official public.yaver.io
      # deployment uses the systemd unit (relay/deploy/yaver-
      # relay.service), not this docker-compose, and supplies its own
      # CONVEX_URL there.
      - CONVEX_URL=${CONVEX_URL:-}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
