name: Verify Android Keystore Secret

# One-off diagnostic: tests whether ANDROID_KEYSTORE_PASSWORD secret unlocks
# ANDROID_KEYSTORE secret. Used during the May 2026 keystore rotation to
# confirm whether the leaked password "yaver2024release" is still active.
# Delete this file after rotation completes.

on:
  workflow_dispatch:
    inputs:
      probe_password:
        description: 'Probe a specific password against the secret (compares hashes only)'
        type: string
        required: false
        default: ''

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          if [ -z "$ANDROID_KEYSTORE" ]; then
            echo "::error::ANDROID_KEYSTORE secret is empty/unset"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE" | base64 --decode > /tmp/test.keystore
          echo "Decoded keystore size: $(wc -c < /tmp/test.keystore) bytes"
          file /tmp/test.keystore || true

      - name: Test current secret password
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_PASSWORD" ]; then
            echo "::error::ANDROID_KEYSTORE_PASSWORD secret is empty/unset"
            exit 1
          fi
          if keytool -list -keystore /tmp/test.keystore -storepass "$ANDROID_KEYSTORE_PASSWORD" >/tmp/keytool.out 2>&1; then
            echo "::notice::CURRENT SECRET WORKS — keystore unlocks with ANDROID_KEYSTORE_PASSWORD"
            grep -E "Alias name:|Certificate fingerprints:|SHA1:|SHA256:" /tmp/keytool.out || true
          else
            echo "::error::CURRENT SECRET DOES NOT UNLOCK keystore"
            cat /tmp/keytool.out
            exit 1
          fi

      - name: Probe leaked password (if input provided)
        if: ${{ github.event.inputs.probe_password != '' }}
        env:
          PROBE_PW: ${{ github.event.inputs.probe_password }}
        run: |
          # Probe: does the leaked password still unlock the keystore?
          # We do NOT echo the password value; only success/fail.
          if keytool -list -keystore /tmp/test.keystore -storepass "$PROBE_PW" >/dev/null 2>&1; then
            echo "::warning::LEAKED PASSWORD STILL VALID — rotate immediately"
            echo "result=valid" >> $GITHUB_OUTPUT
          else
            echo "::notice::Leaked password NOT valid — secret has been rotated"
            echo "result=invalid" >> $GITHUB_OUTPUT
          fi

      - name: Cleanup
        if: always()
        run: rm -f /tmp/test.keystore /tmp/keytool.out
