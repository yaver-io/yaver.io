name: Release Mobile

on:
  push:
    tags:
      - "mobile/v*"
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: "Upload iOS build to TestFlight"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      upload_playstore:
        description: "Upload Android AAB to Google Play internal testing"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

# Only repo owner can push tags (configure tag protection rules in GitHub).
# All jobs require the "production" environment (configure required reviewers in GitHub).

concurrency:
  group: release-mobile
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract and validate version
        id: version
        run: |
          JSON_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf8')).mobile)")
          if [[ "$GITHUB_REF" == refs/tags/mobile/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/mobile/v}"
            if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
              echo "ERROR: Tag version ($TAG_VERSION) does not match versions.json ($JSON_VERSION)"
              exit 1
            fi
          else
            TAG_VERSION="$JSON_VERSION"
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  ios:
    # iOS TestFlight is LOCAL-ONLY — never run from CI. The runner's
    # keychain doesn't carry the developer-account-registered iPhone
    # UDIDs that the provisioning profile bakes in, so xcodebuild
    # always fails at archive with "Device <UDID> isn't registered"
    # / "No profiles for 'io.yaver.mobile' were found". Don't try to
    # fix it; ship from the Mac with `./scripts/deploy-testflight.sh`.
    # See README.md → "iOS TestFlight is LOCAL-ONLY".
    needs: validate
    if: false  # disabled: see README.md
    runs-on: macos-15
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"

      - name: Install dependencies
        run: cd mobile && npm ci --legacy-peer-deps

      - name: Prebuild native projects
        run: cd mobile && npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: cd mobile/ios && pod install

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          # Decode via python3 — shell `base64` on macOS runners
          # sometimes chokes on GitHub-secret newlines and writes a
          # file whose JWT signer rejects as "keyPathInvalid". python
          # is bulletproof across platforms.
          # Try base64 decode first (how the secret is normally stored
          # when produced by `base64 < AuthKey_XXX.p8`). If the result
          # doesn't look like PEM, fall back to the raw secret value —
          # some workflows paste the .p8 contents directly.
          KEYFILE=~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          python3 -c "import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ['APP_STORE_CONNECT_API_KEY']))" > "$KEYFILE" || true
          if ! grep -q "BEGIN .*PRIVATE KEY" "$KEYFILE"; then
            printf '%s' "$APP_STORE_CONNECT_API_KEY" > "$KEYFILE"
          fi
          chmod 600 "$KEYFILE"
          if ! grep -q "BEGIN .*PRIVATE KEY" "$KEYFILE"; then
            echo "APP_STORE_CONNECT_API_KEY: neither base64-encoded nor raw PEM. Rotate via:"
            echo "  gh secret set APP_STORE_CONNECT_API_KEY --body \"\$(cat AuthKey_XXX.p8 | base64)\""
            exit 1
          fi
          echo "p8 header: $(grep -m1 'BEGIN' "$KEYFILE")"

      - name: Bump build number
        run: |
          PLIST="mobile/ios/Yaver/Info.plist"
          NEW_BUILD=$((100 + ${{ github.run_number }}))
          /usr/libexec/PlistBuddy -c "Set CFBundleVersion $NEW_BUILD" "$PLIST"
          echo "Build number: $NEW_BUILD"

      - name: Archive
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cd mobile/ios
          xcodebuild -workspace Yaver.xcworkspace -scheme Yaver -configuration Release \
            -archivePath /tmp/Yaver.xcarchive archive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} CODE_SIGN_STYLE=Automatic \
            ENABLE_USER_SCRIPT_SANDBOXING=NO -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -derivedDataPath /tmp/YaverBuild

      - name: Export and upload to TestFlight
        # Tag-triggered runs always upload. workflow_dispatch runs honour the
        # upload_testflight input so manual runs can build-only for testing.
        if: github.event_name == 'push' || github.event.inputs.upload_testflight == 'true'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > /tmp/ExportOptions.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key><string>app-store</string>
              <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key><string>automatic</string>
              <key>destination</key><string>upload</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive -archivePath /tmp/Yaver.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/YaverExport -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

          echo "TestFlight upload complete for v${VERSION}"

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  android:
    needs: validate
    if: github.event_name == 'push' || github.event.inputs.upload_playstore == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.4"
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: cd mobile && npm ci --legacy-peer-deps

      - name: Prebuild native projects
        run: cd mobile && npx expo prebuild --platform android --clean

      # `expo prebuild --clean` wipes android/app/src/main/res/drawable/
      # splashscreen_logo.xml. Gradle fails linking resources without
      # it (CLAUDE.md documents this). Write a transparent shape
      # drawable so the resource exists; the real splash is
      # overlaid elsewhere.
      - name: Restore splashscreen_logo drawable
        run: |
          DIR="mobile/android/app/src/main/res/drawable"
          mkdir -p "$DIR"
          cat > "$DIR/splashscreen_logo.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="@android:color/transparent"/>
          </shape>
          XML

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > mobile/android/app/release.keystore

      - name: Bump versionCode
        run: |
          GRADLE_FILE="mobile/android/app/build.gradle"
          NEW_CODE=$((100 + ${{ github.run_number }}))
          sed -i "s/versionCode [0-9]*/versionCode $NEW_CODE/" "$GRADLE_FILE"
          echo "versionCode: $NEW_CODE"

      - name: Build release AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd mobile/android

          cat >> app/build.gradle <<SIGNING

          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword "$ANDROID_KEYSTORE_PASSWORD"
                      keyAlias "$ANDROID_KEY_ALIAS"
                      keyPassword "$ANDROID_KEY_PASSWORD"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          SIGNING

          ./gradlew clean bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload AAB to Google Play (internal testing)
        # Tag-triggered runs always upload. workflow_dispatch runs honour the
        # upload_playstore input so manual runs can build-only for testing.
        # If PLAY_STORE_SERVICE_ACCOUNT_JSON isn't set the step fails loudly.
        if: github.event_name == 'push' || github.event.inputs.upload_playstore == 'true'
        env:
          PLAY_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_STORE_SERVICE_ACCOUNT_JSON" ]; then
            echo "ERROR: PLAY_STORE_SERVICE_ACCOUNT_JSON secret is not set."
            echo "Set it with:  gh secret set PLAY_STORE_SERVICE_ACCOUNT_JSON < keys/google-play-service-account.json"
            exit 1
          fi
          python3 -m pip install --quiet --upgrade google-auth google-api-python-client
          KEYFILE="$RUNNER_TEMP/play-service-account.json"
          # The secret may be stored as raw JSON or base64. Try base64 first,
          # fall back to raw when the decoded value doesn't look like JSON.
          python3 -c "import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ['PLAY_STORE_SERVICE_ACCOUNT_JSON']))" > "$KEYFILE" 2>/dev/null || true
          if ! head -c1 "$KEYFILE" | grep -q '{'; then
            printf '%s' "$PLAY_STORE_SERVICE_ACCOUNT_JSON" > "$KEYFILE"
          fi
          if ! head -c1 "$KEYFILE" | grep -q '{'; then
            echo "ERROR: PLAY_STORE_SERVICE_ACCOUNT_JSON is neither base64 nor raw JSON."
            exit 1
          fi
          chmod 600 "$KEYFILE"
          PLAY_STORE_KEY_FILE="$KEYFILE" python3 scripts/upload-playstore.py

  update-versions:
    needs: [validate, ios, android]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.ios.result == 'success' || needs.ios.result == 'skipped') &&
      (needs.android.result == 'success' || needs.android.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update Convex mobile version
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          cd backend && npm ci
          ../scripts/update-convex-version.sh mobile "$VERSION"
