name: Release CLI

on:
  push:
    tags:
      - "cli/v*"

# Only repo owner can push tags (configure tag protection rules in GitHub).
# Release/deploy jobs require the "production" environment (configure required reviewers in GitHub).

concurrency:
  group: release-cli
  cancel-in-progress: false

permissions:
  contents: write

env:
  GO_VERSION: "1.22"

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/cli/v}"
          JSON_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf8')).cli)")
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match versions.json ($JSON_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG_VERSION"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd desktop/agent
          BINARY_NAME="yaver-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "$BINARY_NAME" .
          echo "Built: $BINARY_NAME"

      - name: Package tar.gz (Linux/macOS)
        if: matrix.goos != 'windows'
        run: |
          cd desktop/agent
          BINARY="yaver-${{ matrix.goos }}-${{ matrix.goarch }}"
          cp "$BINARY" yaver
          tar czf "yaver-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" yaver
          rm yaver

      - name: Build deb and rpm packages (Linux)
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y rpm
          cd desktop/agent
          BINARY="yaver-${{ matrix.goos }}-${{ matrix.goarch }}"
          DEB_ARCH="${{ matrix.goarch }}"
          RPM_ARCH="${{ matrix.goarch }}"
          if [ "$DEB_ARCH" = "amd64" ]; then RPM_ARCH="x86_64"; fi
          if [ "$DEB_ARCH" = "arm64" ]; then RPM_ARCH="aarch64"; fi

          # Build .deb
          DEB_DIR="/tmp/yaver-deb"
          rm -rf "$DEB_DIR"
          mkdir -p "$DEB_DIR/usr/local/bin" "$DEB_DIR/DEBIAN"
          cp "$BINARY" "$DEB_DIR/usr/local/bin/yaver"
          chmod 755 "$DEB_DIR/usr/local/bin/yaver"
          cat > "$DEB_DIR/DEBIAN/control" <<CONTROL
          Package: yaver
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: Yaver <packages@yaver.io>
          Description: AI coding agent on your phone — P2P remote control for Claude Code, Codex, Aider, Ollama
          Homepage: https://yaver.io
          Section: devel
          Priority: optional
          CONTROL
          dpkg-deb --build "$DEB_DIR" "yaver_${VERSION}_${DEB_ARCH}.deb"

          # Build .rpm
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp "$BINARY" ~/rpmbuild/SOURCES/yaver
          cat > ~/rpmbuild/SPECS/yaver.spec <<SPEC
          Name: yaver
          Version: ${VERSION}
          Release: 1
          Summary: AI coding agent — P2P remote control for Claude Code, Codex, Aider, Ollama
          License: MIT
          URL: https://yaver.io

          %description
          Run AI coding agents from your phone — Claude Code, Codex, Aider, or custom.

          %install
          mkdir -p %{buildroot}/usr/local/bin
          cp %{_sourcedir}/yaver %{buildroot}/usr/local/bin/yaver
          chmod 755 %{buildroot}/usr/local/bin/yaver

          %files
          /usr/local/bin/yaver
          SPEC
          rpmbuild -bb --target "${RPM_ARCH}" ~/rpmbuild/SPECS/yaver.spec
          cp ~/rpmbuild/RPMS/${RPM_ARCH}/yaver-${VERSION}-1.${RPM_ARCH}.rpm "yaver_${VERSION}_${RPM_ARCH}.rpm"

      - name: Package zip (Windows)
        if: matrix.goos == 'windows'
        run: |
          cd desktop/agent
          zip "yaver-windows-${{ matrix.goarch }}.zip" "yaver-windows-${{ matrix.goarch }}.exe"

      - name: Create DMG (macOS)
        if: matrix.goos == 'darwin'
        run: |
          cd desktop/agent
          BINARY="yaver-${{ matrix.goos }}-${{ matrix.goarch }}"
          ARCH_LABEL="${{ matrix.goarch }}"
          if [ "$ARCH_LABEL" = "arm64" ]; then ARCH_LABEL="apple-silicon"; fi
          if [ "$ARCH_LABEL" = "amd64" ]; then ARCH_LABEL="intel"; fi
          DMG_NAME="Yaver-${VERSION}-${ARCH_LABEL}.dmg"

          # Create .app bundle
          APP_DIR="/tmp/Yaver.app"
          rm -rf "$APP_DIR"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp "$BINARY" "$APP_DIR/Contents/MacOS/yaver"
          chmod +x "$APP_DIR/Contents/MacOS/yaver"

          cat > "$APP_DIR/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Yaver</string>
            <key>CFBundleDisplayName</key><string>Yaver CLI</string>
            <key>CFBundleIdentifier</key><string>io.yaver.cli</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>yaver</string>
            <key>CFBundlePackageType</key><string>APPL</string>
          </dict>
          </plist>
          PLIST

          # Create DMG
          DMG_DIR="/tmp/dmg-staging"
          rm -rf "$DMG_DIR"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_DIR" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          hdiutil create -volname "Yaver $VERSION" \
            -srcfolder "$DMG_DIR" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "Created: $DMG_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            desktop/agent/yaver-*.tar.gz
            desktop/agent/yaver-*.zip
            desktop/agent/yaver-*.exe
            desktop/agent/yaver-*.deb
            desktop/agent/yaver-*.rpm
            desktop/agent/Yaver-*.dmg
          retention-days: 7

  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cli-*

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt
          echo "Release files:"
          ls -la

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          gh release create "v${VERSION}" \
            --repo "$REPO" \
            --title "Yaver CLI v${VERSION}" \
            --draft \
            --generate-notes \
            release/*

          echo "Draft release created: v${VERSION}"
          echo "Windows EXE is unsigned — sign with SimplySign before publishing."

  update-package-managers:
    needs: [validate, release]
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Download release assets and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          mkdir -p assets

          # Download tar.gz archives (macOS/Linux) and exe (Windows)
          for ASSET in yaver-darwin-arm64.tar.gz yaver-darwin-amd64.tar.gz yaver-linux-arm64.tar.gz yaver-linux-amd64.tar.gz yaver-windows-amd64.exe; do
            gh release download "v${VERSION}" --repo "$REPO" --pattern "$ASSET" --dir assets
          done

          cd assets
          sha256sum * > ../checksums.txt
          cat ../checksums.txt

          # Export hashes — brew/AUR use tar.gz hashes, Scoop/Winget/Choco use exe hash
          echo "SHA_DARWIN_ARM64=$(sha256sum yaver-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_DARWIN_AMD64=$(sha256sum yaver-darwin-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_LINUX_ARM64=$(sha256sum yaver-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_LINUX_AMD64=$(sha256sum yaver-linux-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "SHA_WINDOWS_AMD64=$(sha256sum yaver-windows-amd64.exe | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/kivanccakmak/homebrew-yaver.git" homebrew-yaver
          cat > homebrew-yaver/Formula/yaver.rb <<FORMULA
          class Yaver < Formula
            desc "AI coding agent on your phone — P2P remote control for Claude Code, Codex, Aider, Ollama"
            homepage "https://yaver.io"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/v${VERSION}/yaver-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/${REPO}/releases/download/v${VERSION}/yaver-darwin-amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/v${VERSION}/yaver-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/${REPO}/releases/download/v${VERSION}/yaver-linux-amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "yaver"
            end

            test do
              assert_match "yaver", shell_output("#{bin}/yaver version")
            end
          end
          FORMULA
          cd homebrew-yaver
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update yaver to v${VERSION}"
          git push origin main

      - name: Update Scoop manifest
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/kivanccakmak/scoop-yaver.git" scoop-yaver
          cat > scoop-yaver/yaver.json <<MANIFEST
          {
            "version": "${VERSION}",
            "description": "AI coding agent on your phone — P2P remote control for Claude Code, Codex, Aider, Ollama",
            "homepage": "https://yaver.io",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/${REPO}/releases/download/v${VERSION}/yaver-windows-amd64.exe",
                "hash": "${SHA_WINDOWS_AMD64}"
              }
            },
            "bin": [["yaver-windows-amd64.exe", "yaver"]],
            "checkver": {
              "github": "https://github.com/${REPO}"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/${REPO}/releases/download/v\$version/yaver-windows-amd64.exe"
                }
              }
            }
          }
          MANIFEST
          cd scoop-yaver
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update yaver to v${VERSION}"
          git push origin main

      - name: Update AUR PKGBUILD
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/kivanccakmak/aur-yaver.git" aur-yaver
          cat > aur-yaver/PKGBUILD <<'PKGBUILD_HEADER'
          # Maintainer: Yaver <packages@yaver.io>
          pkgname=yaver
          PKGBUILD_HEADER
          cat >> aur-yaver/PKGBUILD <<PKGBUILD_BODY
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Run AI coding agents from your phone — Claude, Codex, Aider, or custom"
          arch=('x86_64' 'aarch64')
          url="https://yaver.io"
          license=('MIT')
          provides=('yaver')

          source_x86_64=("https://github.com/${REPO}/releases/download/v\${pkgver}/yaver-linux-amd64.tar.gz")
          source_aarch64=("https://github.com/${REPO}/releases/download/v\${pkgver}/yaver-linux-arm64.tar.gz")

          sha256sums_x86_64=('${SHA_LINUX_AMD64}')
          sha256sums_aarch64=('${SHA_LINUX_ARM64}')

          package() {
              install -Dm755 yaver "\$pkgdir/usr/bin/yaver"
          }
          PKGBUILD_BODY
          cd aur-yaver
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update yaver to v${VERSION}"
          git push origin main

      - name: Submit Winget manifest
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          MDIR="manifests/y/Yaver/Yaver/${VERSION}"
          mkdir -p "$MDIR"

          cat > "$MDIR/Yaver.Yaver.yaml" <<WINGET
          # yaml-language-server: \$schema=https://aka.ms/winget-manifest.singleton.1.6.0.schema.json
          PackageIdentifier: Yaver.Yaver
          PackageVersion: "${VERSION}"
          PackageName: Yaver CLI
          Publisher: Yaver
          License: MIT
          ShortDescription: AI coding agent on your phone — P2P remote control for Claude Code, Codex, Aider, Ollama
          PackageUrl: https://yaver.io
          Installers:
            - Architecture: x64
              InstallerType: portable
              InstallerUrl: https://github.com/${REPO}/releases/download/v${VERSION}/yaver-windows-amd64.exe
              InstallerSha256: ${SHA_WINDOWS_AMD64}
              Commands:
                - yaver
          ManifestType: singleton
          ManifestVersion: 1.6.0
          WINGET

          echo "Winget manifest generated at $MDIR/Yaver.Yaver.yaml"
          echo "To publish: fork microsoft/winget-pkgs, add this manifest, and submit a PR."
          echo "Or use: wingetcreate submit --token \$GH_TOKEN $MDIR"

      - name: Update Chocolatey package
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          mkdir -p choco-yaver/tools
          cat > choco-yaver/yaver.nuspec <<NUSPEC
          <?xml version="1.0" encoding="utf-8"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2015/06/nuspec.xsd">
            <metadata>
              <id>yaver</id>
              <version>${VERSION}</version>
              <title>Yaver CLI</title>
              <authors>Yaver</authors>
              <owners>kivanccakmak</owners>
              <projectUrl>https://yaver.io</projectUrl>
              <licenseUrl>https://github.com/${REPO}/blob/main/LICENSE</licenseUrl>
              <requireLicenseAcceptance>false</requireLicenseAcceptance>
              <description>AI coding agent on your phone — P2P remote control for Claude Code, Codex, Aider, Ollama</description>
              <summary>Run AI coding agents from your phone</summary>
              <tags>yaver ai cli developer-tools remote</tags>
            </metadata>
          </package>
          NUSPEC

          cat > choco-yaver/tools/chocolateyinstall.ps1 <<'CHOCO_HEADER'
          \$ErrorActionPreference = 'Stop'
          CHOCO_HEADER
          cat >> choco-yaver/tools/chocolateyinstall.ps1 <<CHOCO_BODY
          \$url = "https://github.com/${REPO}/releases/download/v${VERSION}/yaver-windows-amd64.exe"
          \$checksum = "${SHA_WINDOWS_AMD64}"
          \$installDir = "\$(Split-Path -parent \$MyInvocation.MyCommand.Definition)"
          Get-ChocolateyWebFile -PackageName 'yaver' -FileFullPath "\$installDir/yaver.exe" -Url64bit \$url -Checksum64 \$checksum -ChecksumType64 'sha256'
          CHOCO_BODY

          echo "Chocolatey package generated at choco-yaver/"
          echo "To publish: choco pack choco-yaver/yaver.nuspec && choco push yaver.${VERSION}.nupkg --api-key \$CHOCO_API_KEY"

      - name: Update apt repository
        env:
          GH_TOKEN: ${{ secrets.YAVER_CLI_REPO_TOKEN }}
        run: |
          REPO="${{ secrets.YAVER_CLI_REPO || github.repository }}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/kivanccakmak/apt-yaver.git" apt-yaver

          # Download deb packages from release
          for ARCH in amd64 arm64; do
            DEB="yaver_${VERSION}_${ARCH}.deb"
            gh release download "v${VERSION}" --repo "$REPO" --pattern "$DEB" --dir apt-yaver/pool/ 2>/dev/null || echo "No $DEB found in release"
          done

          # Regenerate Packages index
          cd apt-yaver
          mkdir -p dists/stable/main/binary-amd64 dists/stable/main/binary-arm64
          for ARCH in amd64 arm64; do
            if ls pool/yaver_*_${ARCH}.deb 1>/dev/null 2>&1; then
              dpkg-scanpackages --arch "$ARCH" pool/ > "dists/stable/main/binary-${ARCH}/Packages"
              gzip -k -f "dists/stable/main/binary-${ARCH}/Packages"
            fi
          done

          # Generate Release file
          cat > dists/stable/Release <<RELEASE
          Origin: Yaver
          Label: Yaver
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: Yaver CLI apt repository
          RELEASE

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Update yaver to v${VERSION}"
          git push origin main

  docker:
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: desktop/agent
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            kivanccakmak/yaver-cli:latest
            kivanccakmak/yaver-cli:${{ env.VERSION }}
            ghcr.io/${{ github.repository }}/cli:latest
            ghcr.io/${{ github.repository }}/cli:${{ env.VERSION }}
