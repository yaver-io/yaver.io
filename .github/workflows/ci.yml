name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Detect which components changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.resolve.outputs.cli }}
      relay: ${{ steps.resolve.outputs.relay }}
      mobile: ${{ steps.resolve.outputs.mobile }}
      web: ${{ steps.resolve.outputs.web }}
      backend: ${{ steps.resolve.outputs.backend }}
      installer: ${{ steps.resolve.outputs.installer }}
      mcp: ${{ steps.resolve.outputs.mcp }}
      sdk: ${{ steps.resolve.outputs.sdk }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            cli:
              - 'desktop/agent/**'
            relay:
              - 'relay/**'
            mcp:
              - 'mcp/**'
            mobile:
              - 'mobile/**'
            web:
              - 'web/**'
            backend:
              - 'backend/**'
            installer:
              - 'desktop/installer/**'
            sdk:
              - 'sdk/**'
      # On workflow_dispatch we don't have a base ref to diff against, so run
      # every component unconditionally. On pull_request, forward the
      # paths-filter output as-is.
      - name: Resolve filter outputs
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            for name in cli relay mcp mobile web backend installer sdk; do
              echo "$name=true" >> "$GITHUB_OUTPUT"
            done
          else
            echo "cli=${{ steps.filter.outputs.cli }}" >> "$GITHUB_OUTPUT"
            echo "relay=${{ steps.filter.outputs.relay }}" >> "$GITHUB_OUTPUT"
            echo "mcp=${{ steps.filter.outputs.mcp }}" >> "$GITHUB_OUTPUT"
            echo "mobile=${{ steps.filter.outputs.mobile }}" >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filter.outputs.web }}" >> "$GITHUB_OUTPUT"
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "installer=${{ steps.filter.outputs.installer }}" >> "$GITHUB_OUTPUT"
            echo "sdk=${{ steps.filter.outputs.sdk }}" >> "$GITHUB_OUTPUT"
          fi

  version-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check version bumps
        run: ./scripts/check-version-bump.sh origin/${{ github.base_ref }}

  go-tests:
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.relay == 'true' || needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Test CLI agent
        if: needs.changes.outputs.cli == 'true'
        run: cd desktop/agent && go test -v -count=1 ./...
      - name: Test relay
        if: needs.changes.outputs.relay == 'true'
        run: cd relay && go test -v -count=1 ./... 2>/dev/null || echo "No relay tests"
      - name: Test MCP server
        if: needs.changes.outputs.mcp == 'true'
        run: cd mcp && go test -v -count=1 ./...

  go-build:
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build CLI
        run: cd desktop/agent && go build -o yaver .

  web-build:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build web
        run: cd web && npm ci && npm run build

  mobile-typecheck:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Typecheck mobile
        run: cd mobile && npm ci && npx tsc --noEmit

  backend-typecheck:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Typecheck backend
        run: cd backend && npm ci && npx convex typecheck

  sdk-tests:
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test Feedback SDK (React Native)
        run: cd sdk/feedback/react-native && npm ci && npm test -- --passWithNoTests

  # Deep agent E2E — builds agent, authenticates, tests every API surface
  agent-e2e:
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Run agent E2E tests
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
        run: ./scripts/test-agent-e2e.sh

  # Ollama LLM integration — install ollama, pull small model, run real task
  agent-ollama:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh
      - name: Pull small model
        run: ollama pull qwen2.5-coder:1.5b
      - name: Build agent
        run: cd desktop/agent && go build -o /tmp/yaver .
      - name: Get CI token
        id: auth
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
        run: |
          URL="${CONVEX_SITE_URL:-https://shocking-echidna-394.eu-west-1.convex.site}"
          TOKEN=$(curl -sf -X POST "$URL/auth/login" -H "Content-Type: application/json" \
            -d '{"email":"ci-test@yaver.io","password":"ciTestPass2026!"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null) || true
          if [ -z "$TOKEN" ]; then
            TOKEN=$(curl -sf -X POST "$URL/auth/signup" -H "Content-Type: application/json" \
              -d '{"email":"ci-test@yaver.io","fullName":"CI Test","password":"ciTestPass2026!"}' \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null) || true
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Start agent (real mode)
        run: |
          mkdir -p ~/.yaver
          echo "{\"auth_token\":\"${{ steps.auth.outputs.token }}\",\"convex_site_url\":\"${{ steps.auth.outputs.url }}\",\"device_id\":\"ci-ollama\"}" > ~/.yaver/config.json
          /tmp/yaver serve --debug --no-relay --port 18080 --quic-port 4433 > /tmp/agent.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:18080/health >/dev/null 2>&1 && break; sleep 0.5; done
      - name: Run hello-world task via Ollama
        run: |
          TASK=$(curl -sf -X POST http://127.0.0.1:18080/tasks \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"prompt":"Write a Python hello world script. Just output the code, nothing else.","runner":"ollama"}')
          TASK_ID=$(echo "$TASK" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Task: $TASK_ID"
          # Poll until finished (max 120s).
          for i in $(seq 1 60); do
            STATUS=$(curl -sf http://127.0.0.1:18080/tasks/$TASK_ID \
              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            [ "$STATUS" = "finished" ] && break
            sleep 2
          done
          echo "Final status: $STATUS"
          OUTPUT=$(curl -sf http://127.0.0.1:18080/tasks/$TASK_ID/output \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" 2>/dev/null)
          echo "Output: $OUTPUT"
          [ "$STATUS" = "finished" ] || { echo "Task did not finish"; cat /tmp/agent.log | tail -30; exit 1; }
