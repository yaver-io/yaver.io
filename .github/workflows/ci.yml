name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Detect which components changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.resolve.outputs.cli }}
      relay: ${{ steps.resolve.outputs.relay }}
      mobile: ${{ steps.resolve.outputs.mobile }}
      web: ${{ steps.resolve.outputs.web }}
      backend: ${{ steps.resolve.outputs.backend }}
      installer: ${{ steps.resolve.outputs.installer }}
      mcp: ${{ steps.resolve.outputs.mcp }}
      sdk: ${{ steps.resolve.outputs.sdk }}
      piImage: ${{ steps.resolve.outputs.piImage }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            cli:
              - 'desktop/agent/**'
            relay:
              - 'relay/**'
            mcp:
              - 'mcp/**'
            mobile:
              - 'mobile/**'
            web:
              - 'web/**'
            backend:
              - 'backend/**'
            installer:
              - 'desktop/installer/**'
            sdk:
              - 'sdk/**'
            piImage:
              - 'pi-image/**'
              - 'scripts/build-pi-image.sh'
              - 'scripts/upload-downloads.mjs'
              - 'desktop/agent/**'
              - 'versions.json'
      # On workflow_dispatch we don't have a base ref to diff against, so run
      # every component unconditionally. On pull_request, forward the
      # paths-filter output as-is.
      - name: Resolve filter outputs
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            for name in cli relay mcp mobile web backend installer sdk piImage; do
              echo "$name=true" >> "$GITHUB_OUTPUT"
            done
          else
            echo "cli=${{ steps.filter.outputs.cli }}" >> "$GITHUB_OUTPUT"
            echo "relay=${{ steps.filter.outputs.relay }}" >> "$GITHUB_OUTPUT"
            echo "mcp=${{ steps.filter.outputs.mcp }}" >> "$GITHUB_OUTPUT"
            echo "mobile=${{ steps.filter.outputs.mobile }}" >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filter.outputs.web }}" >> "$GITHUB_OUTPUT"
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "installer=${{ steps.filter.outputs.installer }}" >> "$GITHUB_OUTPUT"
            echo "sdk=${{ steps.filter.outputs.sdk }}" >> "$GITHUB_OUTPUT"
            echo "piImage=${{ steps.filter.outputs.piImage }}" >> "$GITHUB_OUTPUT"
          fi

  version-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Check version bumps
        run: ./scripts/check-version-bump.sh origin/${{ github.base_ref }}

  go-tests:
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.relay == 'true' || needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: |
            desktop/agent/go.sum
            relay/go.sum
            mcp/go.sum
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Test CLI agent
        if: needs.changes.outputs.cli == 'true'
        run: cd desktop/agent && go test -v -count=1 ./...
      - name: Test relay
        if: needs.changes.outputs.relay == 'true'
        run: cd relay && go test -v -count=1 ./... 2>/dev/null || echo "No relay tests"
      - name: Test MCP server
        if: needs.changes.outputs.mcp == 'true'
        run: cd mcp && go test -v -count=1 ./...

  go-build:
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: desktop/agent/go.sum
      - name: Build CLI
        run: cd desktop/agent && go build -o yaver .

  web-build:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      # Cache Next.js build artefacts. First run is cold; subsequent
      # runs on the same branch reuse the incremental build cache
      # which is the real long-pole for `npm run build`.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-${{ hashFiles('web/app/**', 'web/components/**', 'web/lib/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}-
      - name: Build web
        run: cd web && npm ci && npm run build

  mobile-typecheck:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: Typecheck mobile
        run: |
          cd mobile
          npm ci
          cd ..
          node scripts/generate-sdk-manifest.mjs --check
          cd mobile
          npx tsc --noEmit

  backend-typecheck:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Typecheck backend
        run: cd backend && npm ci && npx convex typecheck

  sdk-tests:
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/feedback/react-native/package-lock.json
      - name: Test Feedback SDK (React Native)
        run: cd sdk/feedback/react-native && npm ci && npm test -- --passWithNoTests

  pi-image-validate:
    needs: changes
    if: needs.changes.outputs.piImage == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: desktop/agent/go.sum
      - name: Validate build script syntax
        run: bash -n scripts/build-pi-image.sh
      - name: Build arm64 agent for image injection
        run: cd desktop/agent && GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /tmp/yaver-linux-arm64 .

  # Deep agent E2E — builds agent, authenticates, tests every API surface
  agent-e2e:
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Run agent E2E tests
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
        run: ./scripts/test-agent-e2e.sh

  # Tailscale connectivity — CI runner joins tailnet, tests cross-machine agent
  agent-tailscale:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-yaver-${{ github.run_id }}
          tags: tag:ci
      - name: Verify Tailscale connection
        run: |
          tailscale status
          TS_IP=$(tailscale ip -4)
          echo "Tailscale IPv4: $TS_IP"
          echo "ts_ip=$TS_IP" >> "$GITHUB_ENV"
          # Verify we can resolve our own hostname
          tailscale ping --c 1 $(tailscale ip -4) || true
      - name: Build agent
        run: cd desktop/agent && go build -o /tmp/yaver .
      - name: Get CI token
        id: auth
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
        run: |
          URL="${CONVEX_SITE_URL:-https://shocking-echidna-394.eu-west-1.convex.site}"
          TOKEN=$(curl -sf -X POST "$URL/auth/login" -H "Content-Type: application/json" \
            -d '{"email":"ci-test@yaver.io","password":"ciTestPass2026!"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null) || true
          [ -z "$TOKEN" ] && TOKEN=$(curl -sf -X POST "$URL/auth/signup" -H "Content-Type: application/json" \
            -d '{"email":"ci-test@yaver.io","fullName":"CI Test","password":"ciTestPass2026!"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null) || true
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Test agent reachable via Tailscale IP
        run: |
          TS_IP=$(tailscale ip -4)
          echo "=== Tailscale Connectivity Test ==="
          echo "Tailscale IP: $TS_IP"

          # Start agent bound to all interfaces (Tailscale IP is a real interface).
          mkdir -p /tmp/ts-test/.yaver
          echo "{\"auth_token\":\"${{ steps.auth.outputs.token }}\",\"convex_site_url\":\"${{ steps.auth.outputs.url }}\",\"device_id\":\"ci-ts-test\"}" > /tmp/ts-test/.yaver/config.json
          HOME=/tmp/ts-test /tmp/yaver serve --debug --port 18080 --quic-port 4433 --dummy --no-relay > /tmp/ts-agent.log 2>&1 &
          AGENT_PID=$!

          # Wait for agent to be ready.
          for i in $(seq 1 20); do curl -sf "http://127.0.0.1:18080/health" >/dev/null 2>&1 && break; sleep 0.5; done

          # 1. Health check via Tailscale IP.
          curl -sf "http://$TS_IP:18080/health" | grep -q ok \
            && echo "PASS: /health via Tailscale IP" \
            || { echo "FAIL: /health via Tailscale IP"; cat /tmp/ts-agent.log; exit 1; }

          # 2. Agent info via Tailscale IP.
          curl -sf "http://$TS_IP:18080/info" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            && echo "PASS: /info via Tailscale IP" \
            || echo "SKIP: /info"

          # 3. Create a task via Tailscale IP.
          TASK=$(curl -sf -X POST "http://$TS_IP:18080/tasks" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"title":"tailscale ci test"}')
          echo "Task response: $TASK"
          echo "$TASK" | grep -q "taskId" \
            && echo "PASS: Task created via Tailscale" \
            || { echo "FAIL: Task creation"; exit 1; }

          # 4. List tasks via Tailscale IP.
          TASKS=$(curl -sf "http://$TS_IP:18080/tasks" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          echo "$TASKS" | grep -q "tailscale ci test" \
            && echo "PASS: Task listed via Tailscale" \
            || echo "SKIP: Task list format may differ"

          # Cleanup.
          kill $AGENT_PID 2>/dev/null || true
          echo "=== All Tailscale tests passed ==="

  # OAuth flow validation — tests auth endpoints, device code, token validation
  auth-flow:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build agent
        run: cd desktop/agent && go build -o /tmp/yaver .
      - name: Test auth endpoints
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
        run: |
          URL="${CONVEX_SITE_URL:-https://shocking-echidna-394.eu-west-1.convex.site}"
          echo "=== Auth Flow Tests ==="

          # 1. Signup flow.
          SIGNUP_EMAIL="ci-auth-$(date +%s)@yaver.test"
          SIGNUP=$(curl -sf -X POST "$URL/auth/signup" -H "Content-Type: application/json" \
            -d "{\"email\":\"$SIGNUP_EMAIL\",\"fullName\":\"CI Auth Test\",\"password\":\"TestPass2026!\"}" 2>/dev/null)
          TOKEN=$(echo "$SIGNUP" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null)
          [ -n "$TOKEN" ] && echo "PASS: Signup returns token" || { echo "FAIL: Signup"; exit 1; }

          # 2. Login with same creds.
          LOGIN=$(curl -sf -X POST "$URL/auth/login" -H "Content-Type: application/json" \
            -d "{\"email\":\"$SIGNUP_EMAIL\",\"password\":\"TestPass2026!\"}" 2>/dev/null)
          LOGIN_TOKEN=$(echo "$LOGIN" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null)
          [ -n "$LOGIN_TOKEN" ] && echo "PASS: Login returns token" || { echo "FAIL: Login"; exit 1; }

          # 3. Validate token.
          VALIDATE=$(curl -sf "$URL/auth/validate" -H "Authorization: Bearer $TOKEN" 2>/dev/null)
          echo "$VALIDATE" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('valid') or d.get('email')" 2>/dev/null \
            && echo "PASS: Token validates" || echo "SKIP: Validate endpoint may differ"

          # 4. Wrong password rejected.
          BAD_LOGIN=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$URL/auth/login" -H "Content-Type: application/json" \
            -d "{\"email\":\"$SIGNUP_EMAIL\",\"password\":\"WrongPass!\"}" 2>/dev/null)
          [ "$BAD_LOGIN" = "401" ] || [ "$BAD_LOGIN" = "400" ] && echo "PASS: Wrong password rejected ($BAD_LOGIN)" || echo "FAIL: Wrong password got $BAD_LOGIN"

          # 5. Device code flow (headless auth).
          DEVICE_CODE=$(curl -sf -X POST "$URL/auth/device-code" -H "Content-Type: application/json" \
            -d '{"deviceName":"CI Test Runner"}' 2>/dev/null)
          USER_CODE=$(echo "$DEVICE_CODE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('userCode',''))" 2>/dev/null)
          [ -n "$USER_CODE" ] && echo "PASS: Device code flow returns userCode=$USER_CODE" || echo "SKIP: Device code endpoint may differ"

          # 6. OAuth redirect URLs work (don't need real OAuth creds, just verify endpoints exist).
          for provider in google apple microsoft; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://yaver.io/api/auth/oauth/$provider?client=desktop" 2>/dev/null)
            [ "$CODE" = "302" ] || [ "$CODE" = "307" ] || [ "$CODE" = "200" ] \
              && echo "PASS: OAuth $provider redirect ($CODE)" \
              || echo "SKIP: OAuth $provider returned $CODE (may need creds)"
          done

          # 7. Cleanup — delete the test account.
          curl -sf -X POST "$URL/auth/delete-account" -H "Authorization: Bearer $TOKEN" 2>/dev/null \
            && echo "PASS: Test account deleted" || echo "SKIP: Delete may not be supported"

          echo "=== Auth tests complete ==="

  # Ollama LLM integration — install ollama, pull small model, run real task
  agent-ollama:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          # The installer sometimes starts its own systemd unit on
          # ubuntu-latest, so a second `ollama serve &` would bind
          # a second listener. Skip spawn if 11434 is already up.
          if curl -sf http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
            echo "ollama already running (installer auto-started)"
          else
            ollama serve > /tmp/ollama.log 2>&1 &
          fi
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:11434/api/tags >/dev/null 2>&1 && break
            sleep 1
          done
      - name: Pull small model
        run: ollama pull qwen2.5-coder:1.5b
      - name: Build agent
        run: cd desktop/agent && go build -o /tmp/yaver .
      - name: Get CI token
        id: auth
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
        run: |
          URL="${CONVEX_SITE_URL:-https://shocking-echidna-394.eu-west-1.convex.site}"
          TOKEN=$(curl -sf -X POST "$URL/auth/login" -H "Content-Type: application/json" \
            -d '{"email":"ci-test@yaver.io","password":"ciTestPass2026!"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null) || true
          if [ -z "$TOKEN" ]; then
            TOKEN=$(curl -sf -X POST "$URL/auth/signup" -H "Content-Type: application/json" \
              -d '{"email":"ci-test@yaver.io","fullName":"CI Test","password":"ciTestPass2026!"}' \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null) || true
          fi
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Start agent (real mode)
        run: |
          mkdir -p ~/.yaver
          echo "{\"auth_token\":\"${{ steps.auth.outputs.token }}\",\"convex_site_url\":\"${{ steps.auth.outputs.url }}\",\"device_id\":\"ci-ollama\"}" > ~/.yaver/config.json
          /tmp/yaver serve --debug --no-relay --port 18080 --quic-port 4433 > /tmp/agent.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:18080/health >/dev/null 2>&1 && break; sleep 0.5; done
      - name: Run hello-world task via Ollama
        run: |
          # POST /tasks requires {title,description[,runner]} per
          # desktop/agent/httpserver.go createTask. The older request
          # shape {prompt,runner} was a leftover from a refactor and
          # always 400s — which is why this step has been chronically
          # red with curl exit 22.
          # POST /tasks returns {id,status,...} at the top level.
          TASK=$(curl -sf -X POST http://127.0.0.1:18080/tasks \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"title":"hello world","description":"Write a Python hello world script. Just output the code, nothing else.","runner":"ollama"}')
          TASK_ID=$(echo "$TASK" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('id') or d.get('taskId'))")
          echo "Task: $TASK_ID"
          # GET /tasks/{id} returns {ok,task:{id,status,...}} — the
          # status is NESTED under .task, not at the top level. The
          # previous `.status` read always came back empty and the
          # task was actually completing fine. Supports the flat
          # shape too for future-proofing.
          STATUS=""
          for i in $(seq 1 60); do
            STATUS=$(curl -sf http://127.0.0.1:18080/tasks/$TASK_ID \
              -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print((d.get('task') or d).get('status',''))" 2>/dev/null)
            case "$STATUS" in
              completed|failed|stopped) break ;;
            esac
            sleep 2
          done
          echo "Final status: $STATUS"
          OUTPUT=$(curl -sf http://127.0.0.1:18080/tasks/$TASK_ID \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" 2>/dev/null)
          echo "Output: $OUTPUT"
          if [ "$STATUS" != "completed" ]; then
            echo "Task did not complete (status=$STATUS)"
            tail -60 /tmp/agent.log || true
            exit 1
          fi
