name: Integration Test Suite

on:
  workflow_dispatch:
    inputs:
      tests:
        description: "Tests to run (all, builds, lan, relay, tailscale, cloudflare, unit, sdk, auth, feedback)"
        required: false
        default: "all"
  push:
    branches: [main]
    paths:
      - 'desktop/agent/**'
      - 'relay/**'
      - 'sdk/**'
      - 'backend/convex/**'
      - 'scripts/test-suite.sh'

permissions:
  contents: read
  checks: write

jobs:
  test-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: testing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Run test suite
        id: tests
        env:
          CONVEX_SITE_URL: ${{ secrets.CONVEX_SITE_URL }}
          RELAY_QUIC_ADDR: ${{ secrets.RELAY_QUIC_ADDR }}
          RELAY_HTTP_URL: ${{ secrets.RELAY_HTTP_URL }}
          RELAY_PASSWORD: ${{ secrets.RELAY_PASSWORD }}
          CF_TUNNEL_URL: ${{ secrets.CF_TUNNEL_URL }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          flag=""
          if [ "${{ github.event.inputs.tests }}" != "" ] && [ "${{ github.event.inputs.tests }}" != "all" ]; then
            flag="--${{ github.event.inputs.tests }}"
          fi
          ./scripts/test-suite.sh $flag 2>&1 | tee /tmp/test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Go SDK unit tests (JUnit)
        if: always()
        run: |
          cd sdk/go/yaver
          go install github.com/jstemmer/go-junit-report/v2@latest 2>/dev/null || true
          go test -v -count=1 ./... 2>&1 | go-junit-report > /tmp/go-sdk-junit.xml 2>/dev/null || true

      - name: Go agent unit tests (JUnit)
        if: always()
        run: |
          cd desktop/agent
          go test -v -count=1 ./... 2>&1 | go-junit-report > /tmp/go-agent-junit.xml 2>/dev/null || true

      - name: Python SDK tests (JUnit)
        if: always()
        run: |
          pip install pytest 2>/dev/null || true
          cd sdk/python
          python3 -m pytest test_yaver.py -v --junit-xml=/tmp/python-sdk-junit.xml 2>/dev/null || true

      - name: Generate test summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'HEADER'
          ## Test Results

          HEADER

          # Parse the test output for pass/fail/skip counts
          if grep -q "All tests passed" /tmp/test-output.txt 2>/dev/null; then
            echo "### ✅ All tests passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Some tests failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"

          # Extract individual results from the ANSI-stripped output
          sed 's/\x1b\[[0-9;]*m//g' /tmp/test-output.txt | while IFS= read -r line; do
            case "$line" in
              *"✓ "*)
                name=$(echo "$line" | sed 's/.*✓ //')
                echo "| ${name} | ✅ Pass |" >> "$GITHUB_STEP_SUMMARY"
                ;;
              *"✗ "*)
                name=$(echo "$line" | sed 's/.*✗ //')
                echo "| ${name} | ❌ Fail |" >> "$GITHUB_STEP_SUMMARY"
                ;;
              *"⊘ "*)
                name=$(echo "$line" | sed 's/.*⊘ //')
                echo "| ${name} | ⏭ Skip |" >> "$GITHUB_STEP_SUMMARY"
                ;;
            esac
          done

          # Summary line
          echo "" >> "$GITHUB_STEP_SUMMARY"
          sed 's/\x1b\[[0-9;]*m//g' /tmp/test-output.txt | grep -E "Passed:|Failed:|Skipped:" | head -1 >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: /tmp/*-junit.xml
          if-no-files-found: ignore

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: /tmp/*-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Check test exit code
        if: always()
        run: |
          code="${{ steps.tests.outputs.exit_code }}"
          if [ "$code" != "0" ] && [ "$code" != "" ]; then
            echo "Tests failed with exit code $code"
            exit 1
          fi

  # Feedback SDK integration tests
  test-sdk-feedback:
    if: github.event.inputs.tests == 'all' || github.event.inputs.tests == 'feedback' || github.event.inputs.tests == ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build CLI agent
        run: cd desktop/agent && go build -o yaver .

      - name: Start agent in background
        run: |
          cd desktop/agent
          mkdir -p ~/.yaver
          echo '{"auth_token":"ci-test-token","convex_site_url":"https://fake.convex.site","device_id":"ci-test-device"}' > ~/.yaver/config.json
          ./yaver serve --debug --dummy &
          sleep 3
          curl -s http://localhost:18080/health | grep -q ok

      - name: Run feedback SDK tests
        run: node sdk/feedback/test-app/test-feedback.js http://localhost:18080

      - name: Run Go feedback tests
        run: cd desktop/agent && go test -v -run TestFeedback -count=1 ./...

  # Web feedback SDK tests (jsdom)
  test-sdk-web:
    if: github.event.inputs.tests == 'all' || github.event.inputs.tests == 'feedback' || github.event.inputs.tests == ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and test web SDK
        run: |
          cd sdk/feedback/web
          npm install --save-dev jest @types/jest ts-jest typescript 2>/dev/null || true
          npx jest --passWithNoTests 2>&1 || echo "Web SDK tests: done"

      - name: Run web SDK smoke test
        run: |
          cd sdk/feedback/test-app/web
          npm install
          npx tsx test.js

  # React Native feedback SDK tests
  test-sdk-rn:
    if: github.event.inputs.tests == 'all' || github.event.inputs.tests == 'feedback' || github.event.inputs.tests == ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and test RN SDK
        run: |
          cd sdk/feedback/react-native
          npm install --save-dev jest @types/jest typescript 2>/dev/null || true
          npx jest --passWithNoTests 2>&1 || echo "RN SDK tests: done"

  # Flutter feedback SDK tests
  test-sdk-flutter:
    if: github.event.inputs.tests == 'all' || github.event.inputs.tests == 'feedback' || github.event.inputs.tests == ''
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"

      - name: Run Flutter SDK tests
        run: |
          cd sdk/feedback/flutter
          flutter pub get
          flutter test

      - name: Run Flutter dummy app tests
        run: |
          cd sdk/feedback/test-app/flutter
          flutter pub get
          flutter test

  # Full SDK integration test — agent + all SDKs
  test-sdk-integration:
    if: github.event.inputs.tests == 'all' || github.event.inputs.tests == 'sdk' || github.event.inputs.tests == ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build CLI agent
        run: cd desktop/agent && go build -o yaver .

      - name: Start agent in dummy mode
        run: |
          cd desktop/agent
          mkdir -p ~/.yaver
          echo '{"auth_token":"ci-test-token","convex_site_url":"https://fake.convex.site","device_id":"ci-test-device"}' > ~/.yaver/config.json
          ./yaver serve --debug --dummy &
          sleep 3
          curl -sf http://localhost:18080/health

      - name: Go agent tests (all new features)
        run: |
          cd desktop/agent
          go test -v -run "TestVault|TestBuild|TestFeedback|TestDetect|TestResolve|TestAgent|TestTunnel|TestParse" -count=1 ./...

      - name: Feedback HTTP API tests
        run: node sdk/feedback/test-app/test-feedback.js http://localhost:18080

      - name: Go SDK tests
        run: cd sdk/go/yaver && go test -v -count=1 ./...

      - name: Python SDK tests
        run: |
          cd sdk/python
          python3 test_yaver.py 2>&1 || echo "Python tests done"

      - name: JS SDK build check
        run: |
          cd sdk/js
          npm ci
          npx tsc --noEmit

      - name: Dogfood scenario test
        run: node sdk/feedback/test-app/test-dogfood-scenario.js http://localhost:18080

  # Android emulator integration test (manual trigger — slow)
  test-sdk-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build CLI agent
        run: cd desktop/agent && go build -o yaver .

      - name: Start agent
        run: |
          cd desktop/agent
          mkdir -p ~/.yaver
          echo '{"auth_token":"ci-test-token","convex_site_url":"https://fake.convex.site","device_id":"ci-test-device"}' > ~/.yaver/config.json
          ./yaver serve --debug --dummy &
          sleep 3

      - name: Android Emulator Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            echo "Emulator booted successfully"
            adb devices
            # Future: install test APK, run feedback SDK tests
            echo "SDK emulator test placeholder — emulator works"

  # Separate macOS job for iOS build verification
  build-ios:
    if: github.event.inputs.tests == 'all' || github.event.inputs.tests == 'builds' || github.event.inputs.tests == ''
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install mobile dependencies
        run: cd mobile && npm ci

      - name: Prebuild iOS
        run: cd mobile && rm -rf ios && npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd mobile/ios && pod install

      - name: Build iOS (no codesign)
        run: |
          cd mobile/ios
          xcodebuild -workspace Yaver.xcworkspace -scheme Yaver \
            -configuration Release -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -quiet build
