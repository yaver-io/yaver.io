name: Release Web

on:
  push:
    tags:
      - "web/v*"
  workflow_dispatch:

# Only repo owner can push tags (configure tag protection rules in GitHub).
# Deploy job requires the "production" environment (configure required reviewers in GitHub).

concurrency:
  group: release-web
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      backend_version: ${{ steps.version.outputs.backend_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract and validate version
        id: version
        run: |
          JSON_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf8')).web)")
          BACKEND_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf8')).backend)")
          if [[ "$GITHUB_REF" == refs/tags/web/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/web/v}"
            if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
              echo "ERROR: Tag version ($TAG_VERSION) does not match versions.json ($JSON_VERSION)"
              exit 1
            fi
          else
            TAG_VERSION="$JSON_VERSION"
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "backend_version=$BACKEND_VERSION" >> "$GITHUB_OUTPUT"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
      OAUTH_GITLAB_CLIENT_ID: ${{ secrets.OAUTH_GITLAB_CLIENT_ID }}
      OAUTH_GITLAB_CLIENT_SECRET: ${{ secrets.OAUTH_GITLAB_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm ci

      - name: Sync runtime OAuth secrets to Cloudflare
        if: ${{ env.OAUTH_GITHUB_CLIENT_ID != '' || env.OAUTH_GITLAB_CLIENT_ID != '' }}
        run: |
          cd web
          if [ -n "$OAUTH_GITHUB_CLIENT_ID" ] && [ -n "$OAUTH_GITHUB_CLIENT_SECRET" ]; then
            printf '%s' "$OAUTH_GITHUB_CLIENT_ID" | npx wrangler secret put OAUTH_GITHUB_CLIENT_ID
            printf '%s' "$OAUTH_GITHUB_CLIENT_SECRET" | npx wrangler secret put OAUTH_GITHUB_CLIENT_SECRET
          fi
          if [ -n "$OAUTH_GITLAB_CLIENT_ID" ] && [ -n "$OAUTH_GITLAB_CLIENT_SECRET" ]; then
            printf '%s' "$OAUTH_GITLAB_CLIENT_ID" | npx wrangler secret put OAUTH_GITLAB_CLIENT_ID
            printf '%s' "$OAUTH_GITLAB_CLIENT_SECRET" | npx wrangler secret put OAUTH_GITLAB_CLIENT_SECRET
          fi

      - name: Check size constraint
        run: |
          SIZE=$(du -sm web/ --exclude='node_modules' --exclude='.next' 2>/dev/null | cut -f1 || \
                 du -sm web/ | cut -f1)
          echo "web/ size: ${SIZE}MB"
          if [ "$SIZE" -gt 10 ]; then
            echo "ERROR: web/ exceeds 10 MB size limit (${SIZE}MB)"
            exit 1
          fi

      - name: Build and deploy to Cloudflare Workers
        run: cd web && npm run deploy

      - name: Update Convex web version
        if: ${{ env.CONVEX_DEPLOY_KEY != '' }}
        run: |
          cd backend && npm ci
          npx convex deploy --typecheck disable
          ../scripts/update-convex-version.sh backend "${{ needs.validate.outputs.backend_version }}"
          ../scripts/update-convex-version.sh web "$VERSION"
