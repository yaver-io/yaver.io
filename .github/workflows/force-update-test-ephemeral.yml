# One-shot fix when the agent on yaver-test-ephemeral has a stale
# auto-update repo pointer (default historical pointer was
# kivanccakmak/yaver-cli, whose `latest` tag drifted to v1.37.0 —
# so a current 1.99.x agent thinks it's already up to date and
# silently refuses to update). This workflow SSHs in, installs the
# latest yaver-cli from npm, restarts the systemd service, and
# reports the new version. Manually triggered.
name: Force Update yaver-test-ephemeral

on:
  workflow_dispatch:
    inputs:
      version:
        description: "yaver-cli version to install (default = latest in versions.json)"
        required: false
        default: ""

concurrency:
  group: force-update-test-ephemeral
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target version
        id: target
        run: |
          V='${{ github.event.inputs.version }}'
          if [ -z "$V" ]; then
            V=$(node -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf8')).cli)")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Will install yaver-cli@$V"

      - name: Prepare SSH key
        env:
          HCLOUD_SSH_PRIVATE_KEY_PATH: ${{ runner.temp }}/hcloud_ssh
        run: |
          install -m 600 /dev/stdin "$HCLOUD_SSH_PRIVATE_KEY_PATH" <<'EOF'
          ${{ secrets.HCLOUD_SSH_PRIVATE_KEY }}
          EOF
          echo "HCLOUD_SSH_PRIVATE_KEY_PATH=$HCLOUD_SSH_PRIVATE_KEY_PATH" >> "$GITHUB_ENV"

      - name: Render remote update script
        env:
          TARGET_VERSION: ${{ steps.target.outputs.version }}
        run: |
          cat > "$RUNNER_TEMP/remote-update.sh" <<EOF
          #!/usr/bin/env bash
          set -uo pipefail
          export TARGET_VERSION='$TARGET_VERSION'
          EOF
          # Append the literal body without YAML-block interference.
          cat >> "$RUNNER_TEMP/remote-update.sh" <<'BODY'

          echo "=== current state ==="
          which yaver || true
          yaver --version || true
          id yaver >/dev/null 2>&1 && echo "yaver user: present" || echo "yaver user: absent"

          echo
          echo "=== installing yaver-cli@$TARGET_VERSION ==="
          if id yaver >/dev/null 2>&1; then
            sudo -u yaver -i bash -c "
              set -uo pipefail
              export PATH=/home/yaver/.npm-global/bin:/usr/local/bin:/usr/bin:/bin
              npm install -g 'yaver-cli@$TARGET_VERSION' 2>&1 | tail -20
              which yaver
              yaver --version
            "
          else
            npm install -g "yaver-cli@$TARGET_VERSION" 2>&1 | tail -20
          fi

          echo
          echo "=== restarting agent ==="
          if id yaver >/dev/null 2>&1 && sudo -u yaver -i systemctl --user list-units 2>/dev/null | grep -q yaver; then
            sudo -u yaver -i systemctl --user restart yaver
            echo "(restarted yaver --user unit)"
          elif systemctl list-units --type=service 2>/dev/null | grep -q '^yaver'; then
            systemctl restart yaver
            echo "(restarted yaver root unit)"
          else
            echo "(no systemd unit found — pkill+respawn fallback)"
            pkill -f 'yaver serve' || true
            sleep 1
            if id yaver >/dev/null 2>&1; then
              sudo -u yaver -i bash -c 'nohup yaver serve >> ~/.yaver/agent.log 2>&1 &'
            else
              nohup yaver serve >> /root/.yaver/agent.log 2>&1 &
            fi
          fi

          echo
          echo "=== post-restart state ==="
          sleep 3
          if id yaver >/dev/null 2>&1; then
            sudo -u yaver -i bash -c 'yaver --version || true'
          else
            yaver --version || true
          fi

          for cfg in /home/yaver/.yaver/config.json /root/.yaver/config.json; do
            if [ -f "$cfg" ]; then
              TOKEN=$(python3 -c "import json,sys;print(json.load(open(sys.argv[1])).get('auth_token',''))" "$cfg" 2>/dev/null || true)
              if [ -n "$TOKEN" ]; then
                echo "=== /info from local agent ==="
                curl -fsS -H "Authorization: Bearer $TOKEN" "http://127.0.0.1:18080/info" 2>/dev/null \
                  | python3 -c "import sys,json;d=json.load(sys.stdin);print('  version:',d.get('version'));print('  hostname:',d.get('hostname'));print('  ok:',d.get('ok'))" 2>/dev/null \
                  || echo "(agent not yet responding)"
              fi
              break
            fi
          done
          BODY
          chmod +x "$RUNNER_TEMP/remote-update.sh"

      - name: SSH in and run script
        env:
          HETZNER_TEST_SERVER_IP: ${{ secrets.HETZNER_TEST_SERVER_IP }}
        run: |
          scp -i "$HCLOUD_SSH_PRIVATE_KEY_PATH" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              "$RUNNER_TEMP/remote-update.sh" \
              "root@$HETZNER_TEST_SERVER_IP:/tmp/yaver-force-update.sh"
          ssh -i "$HCLOUD_SSH_PRIVATE_KEY_PATH" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
              "root@$HETZNER_TEST_SERVER_IP" \
              "bash /tmp/yaver-force-update.sh && rm -f /tmp/yaver-force-update.sh"
