name: Tailscale Key Rotation Reminder

on:
  schedule:
    # Run weekly on Monday at 9:00 UTC — catches expiring keys with ~2 weeks notice
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-key:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test Tailscale auth key validity
        id: check
        continue-on-error: true
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-key-check-${{ github.run_id }}
          tags: tag:ci

      - name: Verify connection
        id: verify
        run: |
          if tailscale ip -4 >/dev/null 2>&1; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "Tailscale key is valid"
            tailscale status
          else
            echo "status=expired" >> "$GITHUB_OUTPUT"
            echo "Tailscale key is EXPIRED or INVALID"
          fi

      - name: Create issue if key expired
        if: steps.verify.outputs.status == 'expired'
        uses: actions/github-script@v7
        with:
          script: |
            // Check if an open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tailscale,key-rotation',
              per_page: 1
            });
            if (issues.data.length > 0) {
              console.log('Issue already exists: #' + issues.data[0].number);
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Tailscale auth key expired — rotate TAILSCALE_AUTHKEY',
              body: [
                '## Tailscale auth key needs rotation',
                '',
                'The `TAILSCALE_AUTHKEY` GitHub Actions secret has expired or is invalid.',
                'CI jobs that use Tailscale (`agent-tailscale`) will fail until this is fixed.',
                '',
                '### Steps to fix',
                '1. Go to https://login.tailscale.com/admin/settings/keys',
                '2. Generate a new auth key (Reusable + Ephemeral + tag:ci)',
                '3. Run: `gh secret set TAILSCALE_AUTHKEY --body "<new-key>"`',
                '4. Close this issue',
                '',
                '### Better: switch to OAuth client (no expiration)',
                '1. Go to https://login.tailscale.com/admin/settings/oauth',
                '2. Create OAuth client with `devices:write` scope',
                '3. Run:',
                '   ```',
                '   gh secret set TS_OAUTH_CLIENT_ID --body "<client-id>"',
                '   gh secret set TS_OAUTH_SECRET --body "<client-secret>"',
                '   ```',
                '4. Update workflows to use `oauth-client-id` + `oauth-secret` instead of `authkey`',
                '',
                '_This issue was created automatically by the key rotation check workflow._'
              ].join('\n'),
              labels: ['tailscale', 'key-rotation']
            });
