name: Check ephemeral beacon
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Prepare SSH key
        env:
          HCLOUD_SSH_PRIVATE_KEY_PATH: ${{ runner.temp }}/hcloud_ssh
        run: |
          install -m 600 /dev/stdin "$HCLOUD_SSH_PRIVATE_KEY_PATH" <<'EOF'
          ${{ secrets.HCLOUD_SSH_PRIVATE_KEY }}
          EOF
          echo "HCLOUD_SSH_PRIVATE_KEY_PATH=$HCLOUD_SSH_PRIVATE_KEY_PATH" >> "$GITHUB_ENV"
      - name: Probe
        env:
          HETZNER_TEST_SERVER_IP: ${{ secrets.HETZNER_TEST_SERVER_IP }}
        run: |
          ssh -i "$HCLOUD_SSH_PRIVATE_KEY_PATH" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "root@$HETZNER_TEST_SERVER_IP" bash -s <<'REMOTE'
          echo "--- agent process ---"
          ps -o pid,user,command -p "$(pgrep -x yaver | head -1)" 2>/dev/null || echo "no yaver process"

          echo
          echo "--- agent user HOME ---"
          pid=$(pgrep -x yaver | head -1)
          if [ -n "$pid" ]; then
            cat /proc/$pid/environ 2>/dev/null | tr '\0' '\n' | grep -E '^HOME=|^USER=|^YAVER_'
          fi

          echo
          echo "--- ~/.yaver contents per likely owner ---"
          for d in /root/.yaver /home/yaver/.yaver /var/lib/yaver; do
            if [ -d "$d" ]; then
              echo "[$d]"
              ls -la "$d" 2>&1 | head -10
            fi
          done

          echo
          echo "--- beacon candidates ---"
          for cand in /root/.yaver/last-healthy /home/yaver/.yaver/last-healthy /var/lib/yaver/last-healthy; do
            if [ -f "$cand" ]; then
              age=$(( $(date -u +%s) - $(stat -c '%Y' "$cand") ))
              echo "FOUND $cand age=${age}s"
              cat "$cand"
            fi
          done
          # Final fallback — any last-healthy anywhere under /home or /root
          echo
          echo "--- any last-healthy on disk ---"
          find /home /root /var/lib /tmp -maxdepth 4 -name 'last-healthy' 2>/dev/null | head -10
          echo
          echo "--- agent version ---"
          /usr/local/bin/yaver --version 2>&1 | head -2
          echo
          echo "--- agent stderr (last 40) ---"
          journalctl -u yaver-agent.service --no-pager -n 40 2>/dev/null \
            || journalctl -u yaver.service --no-pager -n 40 2>/dev/null \
            || tail -40 /var/log/yaver.log 2>/dev/null \
            || echo "no agent journal"

          echo
          echo "--- watchdog last 4 runs ---"
          journalctl -u yaver-watchdog.service --no-pager -n 16 2>/dev/null | head -40 || echo "no watchdog journal"
          REMOTE
