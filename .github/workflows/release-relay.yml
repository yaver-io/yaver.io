name: Release Relay

on:
  push:
    tags:
      - "relay/v*"

# Only repo owner can push tags (configure tag protection rules in GitHub).
# Release/deploy jobs require the "production" environment (configure required reviewers in GitHub).

concurrency:
  group: release-relay
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26"

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/relay/v}"
          JSON_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf8')).relay)")
          if [ "$TAG_VERSION" != "$JSON_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match versions.json ($JSON_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - goarch: amd64
          - goarch: arm64
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build relay binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          cd relay
          go build -ldflags="-s -w" -o "yaver-relay-linux-${{ matrix.goarch }}" .

      - name: Package
        run: |
          cd relay
          tar czf "yaver-relay-linux-${{ matrix.goarch }}.tar.gz" "yaver-relay-linux-${{ matrix.goarch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: relay-linux-${{ matrix.goarch }}
          path: relay/yaver-relay-*.tar.gz

  docker:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: relay
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/yaver-relay:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/yaver-relay:latest

  release:
    needs: [validate, build, docker]
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: relay-*

      - name: Prepare release
        run: |
          mkdir -p release
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          cd release && sha256sum * > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "relay/v${VERSION}" \
            --title "Yaver Relay v${VERSION}" \
            --generate-notes \
            release/*

  update-version:
    needs: [validate, release]
    runs-on: ubuntu-latest
    environment: production
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Update Convex relay version
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          cd backend && npm ci
          ../scripts/update-convex-version.sh relay "$VERSION"
