# Builds the slim/distroless Yaver sandbox image and pushes it to both
# GHCR (mirrors the yaver-cloud pattern) and Docker Hub (shorter pull
# path: `docker pull yaver/sandbox-slim`).
#
# Multi-arch: linux/amd64 + linux/arm64. Manifest list lets a single tag
# auto-select per arch — same UX as the official Node/Python images.
#
# Trigger: manual (workflow_dispatch) or on changes to the slim Dockerfile
# or any of its inputs (agent Go source, sandbox build script).
#
# Pull paths after first successful run:
#   ghcr.io/<owner>/yaver-sandbox-slim:latest         (primary)
#   ghcr.io/<owner>/yaver-sandbox-slim:<sha>          (commit-pinned)
#   yaver/sandbox-slim:latest                         (Docker Hub)
#   yaver/sandbox-slim:<cli-version>                  (versioned)

name: build-yaver-sandbox-slim

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "desktop/agent/Dockerfile.sandbox.slim"
      - "desktop/agent/**/*.go"
      - "desktop/agent/go.mod"
      - "desktop/agent/go.sum"
      - ".github/workflows/build-yaver-sandbox-slim.yml"

concurrency:
  group: build-yaver-sandbox-slim
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      # Surface secret-presence as an env bool that subsequent steps can
      # use in `if:` conditionals. Reading `secrets.X` directly inside
      # `if:` is rejected by some workflow validators; hoisting it into
      # `env` is the canonical workaround.
      HAS_DOCKERHUB: ${{ secrets.DOCKERHUB_SANDBOX_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve CLI version
        id: version
        run: |
          CLI_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf8')).cli)")
          echo "version=$CLI_VER" >> "$GITHUB_OUTPUT"

      - name: Compute tag list
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          SHA="${{ github.sha }}"
          VER="${{ steps.version.outputs.version }}"
          {
            echo "list<<EOF"
            echo "ghcr.io/${OWNER}/yaver-sandbox-slim:latest"
            echo "ghcr.io/${OWNER}/yaver-sandbox-slim:${SHA}"
            echo "ghcr.io/${OWNER}/yaver-sandbox-slim:${VER}"
            if [ "${HAS_DOCKERHUB}" = "true" ]; then
              echo "yaver/sandbox-slim:latest"
              echo "yaver/sandbox-slim:${VER}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 emulation on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.HAS_DOCKERHUB == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_SANDBOX_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SANDBOX_TOKEN }}

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          # Context = desktop/agent/ because the Dockerfile builds the
          # yaver Go agent from this module (mirrors Dockerfile.sandbox).
          context: desktop/agent
          file: desktop/agent/Dockerfile.sandbox.slim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Pushed Yaver Sandbox Slim"
            echo ""
            echo "**GHCR (primary)**"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository_owner }}/yaver-sandbox-slim:latest"
            echo '```'
            if [ "${HAS_DOCKERHUB}" = "true" ]; then
              echo ""
              echo "**Docker Hub (mirror)**"
              echo ""
              echo '```bash'
              echo "docker pull yaver/sandbox-slim:latest"
              echo '```'
            fi
            echo ""
            echo "Make GHCR package PUBLIC once at:"
            echo "  Settings → Packages → yaver-sandbox-slim → Package settings → Visibility → Public"
            echo "(otherwise users hit a 403 on first pull)."
          } >> "$GITHUB_STEP_SUMMARY"
