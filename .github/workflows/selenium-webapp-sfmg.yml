# Selenium-driven verification that yaver.io's dashboard
# Webview tab → Web App mode actually renders sfmg's UI inside
# the iframe via the Expo Web sibling spawned on the agent.
# End-to-end proof beyond the SSE smoke: real Chromium, real
# OAuth-tokenised dashboard, real iframe content check.
name: Selenium Web App sfmg

on:
  workflow_dispatch:

concurrency:
  group: selenium-webapp-sfmg
  cancel-in-progress: true

jobs:
  drive:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chromium + deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser
          pip install selenium==4.21.0
          # Chrome WebDriver is bundled into selenium 4.21 via
          # selenium-manager — no chromedriver download needed.

      - name: Pull auth token from yaver-test-ephemeral
        env:
          HCLOUD_SSH_PRIVATE_KEY: ${{ secrets.HCLOUD_SSH_PRIVATE_KEY }}
          HETZNER_TEST_SERVER_IP: ${{ secrets.HETZNER_TEST_SERVER_IP }}
        run: |
          install -m 600 /dev/stdin "$RUNNER_TEMP/ci_key" <<'EOF'
          ${{ secrets.HCLOUD_SSH_PRIVATE_KEY }}
          EOF
          OUT=$(ssh -i "$RUNNER_TEMP/ci_key" \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "root@$HETZNER_TEST_SERVER_IP" \
              "for c in /home/yaver/.yaver/config.json /root/.yaver/config.json; do [ -f \$c ] && python3 -c 'import json,sys;d=json.load(open(sys.argv[1]));print(d.get(\"auth_token\",\"\"));print(d.get(\"device_id\",\"\"))' \$c && break; done")
          TOKEN=$(echo "$OUT" | sed -n '1p')
          DID=$(echo "$OUT" | sed -n '3p' || echo "$OUT" | sed -n '2p')
          echo "::add-mask::$TOKEN"
          echo "TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "DID=$DID" >> "$GITHUB_ENV"
          echo "token_len=${#TOKEN} did=$DID"

      - name: Run Selenium drive
        env:
          BASE_URL: https://yaver.io
        run: |
          cat > /tmp/drive.py <<'PY'
          import os, sys, time, json
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC

          BASE = os.environ.get("BASE_URL", "https://yaver.io")
          TOKEN = os.environ.get("TOKEN", "")
          DID = os.environ.get("DID", "")

          opts = Options()
          opts.add_argument("--headless=new")
          opts.add_argument("--no-sandbox")
          opts.add_argument("--disable-dev-shm-usage")
          opts.add_argument("--window-size=1600,1000")
          driver = webdriver.Chrome(options=opts)
          wait = WebDriverWait(driver, 60)

          try:
              # Inject auth token into localStorage before any app code runs.
              # The dashboard reads `yaver_auth_token` to bootstrap the agent
              # client without going through OAuth.
              driver.get(BASE + "/")
              driver.execute_script(f"window.localStorage.setItem('yaver_auth_token', {json.dumps(TOKEN)});")
              driver.execute_script(f"window.localStorage.setItem('yaver_active_device_id', {json.dumps(DID)});")
              print(f"[selenium] injected token (len={len(TOKEN)}) + device {DID}")

              driver.get(BASE + "/dashboard")
              # Wait for any app shell selector
              wait.until(EC.presence_of_element_located((By.CSS_SELECTOR, "body")))
              print(f"[selenium] dashboard loaded — title: {driver.title}")
              time.sleep(3)

              # Click Webview tab
              try:
                  webview_tab = driver.find_element(By.XPATH, "//*[contains(text(),'Webview') or contains(text(), '📱')]")
                  webview_tab.click()
                  print("[selenium] clicked Webview tab")
                  time.sleep(2)
              except Exception as e:
                  print(f"[selenium] webview tab click failed: {e}")
                  # Continue — might already be on it

              # Click Web App toggle
              try:
                  web_app_btn = driver.find_element(By.XPATH, "//button[normalize-space()='Web App']")
                  web_app_btn.click()
                  print("[selenium] clicked Web App toggle")
                  time.sleep(2)
              except Exception as e:
                  print(f"[selenium] Web App click failed: {e}")
                  driver.save_screenshot("/tmp/error.png")
                  sys.exit(1)

              # Now wait up to 60s for the bundling progress UI OR for the iframe
              # to swap to /dev-web/. Either is success.
              print("[selenium] waiting for bundling progress or iframe…")
              t0 = time.time()
              progress_seen = False
              iframe_seen = False
              for i in range(60):
                  body_text = driver.find_element(By.TAG_NAME, "body").text
                  if "Bundling" in body_text or "expo --web" in body_text or "elapsed" in body_text:
                      if not progress_seen:
                          print(f"[selenium] +{int(time.time()-t0)}s — bundling progress UI visible")
                          progress_seen = True
                  iframes = driver.find_elements(By.TAG_NAME, "iframe")
                  for f in iframes:
                      src = f.get_attribute("src") or ""
                      if "/dev-web/" in src:
                          print(f"[selenium] +{int(time.time()-t0)}s — iframe swapped to dev-web: {src[:120]}")
                          iframe_seen = True
                          break
                  if iframe_seen:
                      break
                  time.sleep(1)

              driver.save_screenshot("/tmp/final.png")
              print(f"[selenium] final state: progress_seen={progress_seen} iframe_seen={iframe_seen}")

              if iframe_seen:
                  print("[selenium] PASS — iframe is loading the Expo Web sibling")
              elif progress_seen:
                  print("[selenium] PARTIAL — progress UI shown but iframe didn't swap in 60s (bundle may still be compiling)")
              else:
                  print("[selenium] FAIL — neither progress UI nor iframe seen")
                  with open("/tmp/page-source.html", "w") as f:
                      f.write(driver.page_source)
                  sys.exit(1)
          finally:
              driver.quit()
          PY
          python3 /tmp/drive.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: |
            /tmp/final.png
            /tmp/error.png
            /tmp/page-source.html
          if-no-files-found: ignore
