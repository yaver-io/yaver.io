# Builds the "yaver image" a bought managed cloud box runs and pushes
# it to GHCR. Lives in CI (not local) because building/pushing this
# heavy multi-tool image from a dev Mac proved unreliable (Docker Hub
# TLS timeouts) — CI runners have fast, stable registry access and
# GHCR push via the built-in GITHUB_TOKEN (no PAT scope juggling).
#
# Trigger: manual (workflow_dispatch) or on changes to the Dockerfile.
# Output: ghcr.io/<owner>/yaver-cloud:latest (+ :sha), linux/amd64
#         (cpx42 is amd64). Provisioning reads YAVER_CLOUD_IMAGE.

name: build-yaver-cloud-image

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "desktop/agent/Dockerfile.yaver-cloud"
      - ".github/workflows/build-yaver-cloud-image.yml"

concurrency:
  group: build-yaver-cloud-image
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: desktop/agent
          file: desktop/agent/Dockerfile.yaver-cloud
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/yaver-cloud:latest
            ghcr.io/${{ github.repository_owner }}/yaver-cloud:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed ghcr.io/${{ github.repository_owner }}/yaver-cloud:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "Make the package PUBLIC once (GH → Packages → yaver-cloud → settings)" >> "$GITHUB_STEP_SUMMARY"
          echo "or the cpx42 cloud-init docker pull (no creds) will 403." >> "$GITHUB_STEP_SUMMARY"
