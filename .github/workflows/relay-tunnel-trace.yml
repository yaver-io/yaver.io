# Trace what the relay actually does with /d/<id>/dev/events.
name: Relay Tunnel Trace

on:
  workflow_dispatch:

concurrency:
  group: relay-tunnel-trace
  cancel-in-progress: true

jobs:
  trace:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Prepare SSH key
        env:
          HCLOUD_SSH_PRIVATE_KEY_PATH: ${{ runner.temp }}/hcloud_ssh
        run: |
          install -m 600 /dev/stdin "$HCLOUD_SSH_PRIVATE_KEY_PATH" <<'EOF'
          ${{ secrets.HCLOUD_SSH_PRIVATE_KEY }}
          EOF
          echo "HCLOUD_SSH_PRIVATE_KEY_PATH=$HCLOUD_SSH_PRIVATE_KEY_PATH" >> "$GITHUB_ENV"

      - name: Render remote-creds-fetcher script
        run: |
          cat > "$RUNNER_TEMP/fetch-creds.sh" <<'BODY'
          #!/usr/bin/env bash
          set -uo pipefail
          for c in /home/yaver/.yaver/config.json /root/.yaver/config.json; do
            if [ -f "$c" ]; then
              python3 - "$c" <<'PYEOF'
          import json, sys, urllib.request
          d = json.load(open(sys.argv[1]))
          tok = d.get('auth_token', '')
          did = d.get('device_id', '')
          convex = d.get('convex_site_url', 'https://perceptive-minnow-557.eu-west-1.convex.site')
          req = urllib.request.Request(convex.rstrip('/') + '/settings', headers={'Authorization': 'Bearer ' + tok})
          rp = ''
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  s = json.load(r)
                  inner = s.get('settings') if isinstance(s, dict) else None
                  if isinstance(inner, dict):
                      rp = inner.get('relayPassword', '') or ''
                  else:
                      rp = s.get('relayPassword', '') or ''
                  sys.stderr.write(f'/settings keys: top={list(s.keys()) if isinstance(s, dict) else type(s).__name__}, settings.keys={list(inner.keys()) if isinstance(inner, dict) else None}\n')
          except Exception as e:
              sys.stderr.write(f'/settings failed: {e}\n')
          print(tok)
          print(rp)
          print(did)
          PYEOF
              break
            fi
          done
          BODY
          chmod +x "$RUNNER_TEMP/fetch-creds.sh"

      - name: Pull creds
        env:
          HETZNER_TEST_SERVER_IP: ${{ secrets.HETZNER_TEST_SERVER_IP }}
        run: |
          scp -i "$HCLOUD_SSH_PRIVATE_KEY_PATH" \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "$RUNNER_TEMP/fetch-creds.sh" "root@$HETZNER_TEST_SERVER_IP:/tmp/fetch-creds.sh"
          OUT=$(ssh -i "$HCLOUD_SSH_PRIVATE_KEY_PATH" \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "root@$HETZNER_TEST_SERVER_IP" "bash /tmp/fetch-creds.sh && rm -f /tmp/fetch-creds.sh")
          TOKEN=$(echo "$OUT" | sed -n '1p')
          RP=$(echo "$OUT" | sed -n '2p')
          DID=$(echo "$OUT" | sed -n '3p')
          echo "token_len=${#TOKEN} rp_len=${#RP} did=$DID"
          echo "::add-mask::$TOKEN"
          echo "::add-mask::$RP"
          {
            echo "TOKEN=$TOKEN"
            echo "RP=$RP"
            echo "DID=$DID"
          } >> "$GITHUB_ENV"

      - name: Probe relay /health
        run: curl -s https://public.yaver.io/health | python3 -m json.tool

      - name: Curl /dev/events through relay (verbose)
        run: |
          URL="https://public.yaver.io/d/$DID/dev/events?token=$TOKEN&__rp=$RP"
          echo '--- 8s curl with -i ---'
          set +e
          timeout 8 curl -sN -i -H "Accept: text/event-stream" "$URL" 2>&1 | head -50
          EC=$?
          echo "(curl exit=$EC)"
          echo '--- with -w stats ---'
          timeout 8 curl -sN -H "Accept: text/event-stream" \
            -w '\nstatus=%{http_code} size_download=%{size_download} time_total=%{time_total}\n' \
            "$URL" 2>&1 | tail -3

      - name: Curl /dev/events DIRECTLY on box
        env:
          HETZNER_TEST_SERVER_IP: ${{ secrets.HETZNER_TEST_SERVER_IP }}
        run: |
          ssh -i "$HCLOUD_SSH_PRIVATE_KEY_PATH" \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "root@$HETZNER_TEST_SERVER_IP" \
              "timeout 5 curl -sN -H 'Authorization: Bearer $TOKEN' -H 'Accept: text/event-stream' http://127.0.0.1:18080/dev/events 2>&1 | head -10"
