name: vibe-preview

# Focused workflow for the vibe-preview feature: agent unit tests, the
# chromedp end-to-end test (with Chromium installed), and a typecheck on
# the mobile + web client modules. Fires on every push to main that
# touches a vibe-preview file, plus on PR + manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "desktop/agent/vibe_preview*.go"
      - "desktop/agent/mobile_client.go"
      - "desktop/agent/loop_cmd.go"
      - "desktop/agent/loop_exec.go"
      - "desktop/agent/loop_fix_target_test.go"
      - "desktop/agent/convex_privacy_test.go"
      - "mobile/src/lib/vibePreview.ts"
      - "mobile/src/components/VibePreviewModal.tsx"
      - "web/components/dashboard/VibePreviewView.tsx"
      - "web/lib/agent-client.ts"
      - ".github/workflows/vibe-preview.yml"
  pull_request:
    branches: [main]
    paths:
      - "desktop/agent/vibe_preview*.go"
      - "desktop/agent/mobile_client.go"
      - "desktop/agent/loop_cmd.go"
      - "desktop/agent/loop_exec.go"
      - "desktop/agent/loop_fix_target_test.go"
      - "desktop/agent/convex_privacy_test.go"
      - "mobile/src/lib/vibePreview.ts"
      - "mobile/src/components/VibePreviewModal.tsx"
      - "web/components/dashboard/VibePreviewView.tsx"
      - "web/lib/agent-client.ts"
      - ".github/workflows/vibe-preview.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  agent-unit:
    name: agent unit tests (-race)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: desktop/agent/go.sum
      - name: Vibe-preview unit tests
        working-directory: desktop/agent
        run: |
          go vet ./...
          # Anchored regex so we don't accidentally pull in unrelated
          # tests that share a TestStop* prefix elsewhere in the package.
          go test -race -count=1 -timeout 120s -run \
            '^(TestProfileFor|TestStart_|TestStop_unknownProject|TestStop_closesBrowserSession|TestRingbuffer_evictsAtCap|TestStableFrameCollapse|TestFrameByHash|TestStopAll_concurrent|TestLiveLoop_capturesFramesOverTime|TestOnCrashDetected_emitsAndTags|TestOnCrashDetected_dedupsBurst|TestMatchVibeCrashLine|TestWaitForStability_quietWindowReturnsStable|TestWaitForStability_crashShortcuts|TestWaitForStability_noProjectIsTriviallyStable|TestQueueSummary_skipsWhenLessThanTwoFrames|TestQueueSummary_shortCircuitsOnIdenticalHashes|TestQueueSummary_callsSummarizerOnDistinctFrames|TestQueueSummary_summarizerErrorEmitsEvent|TestNoopSummarizer_neverErrors|TestAutoDevBranchName_safeChars|TestAutoDevBranchName_emptySpec|TestAutoDevBranchName_uniquePerCall|TestVibePreviewSessionPayload_isCounterOnly|TestVibePreviewClipPayload_isCounterOnly|TestFindExistingExerciseFlow_picksProjectSpecific|TestFindExistingExerciseFlow_fallsBackToSmoke|TestFindExistingExerciseFlow_returnsEmptyWhenNothingMatches|TestWriteCannedExerciseFlow_isValidYAML|TestSeedExerciseFromContext|TestExerciseClip_noopWhenMaestroMissing)$' \
            ./...

  agent-e2e-chromedp:
    name: chromedp E2E (real headless Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: desktop/agent/go.sum

      - name: Install Chromium
        # The Yaver agent uses chromedp which talks Chrome DevTools Protocol;
        # both Chromium and Google Chrome work. Chromium is the smaller
        # apt package and ships the right libnss3 deps out of the box.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser fonts-liberation
          chromium-browser --version

      - name: chromedp integration test
        working-directory: desktop/agent
        env:
          # chromedp picks the binary from PATH; ensuring "chromium-browser"
          # resolves first is enough on ubuntu-latest.
          CHROME_BIN: chromium-browser
        run: |
          go test -count=1 -timeout 180s -run '^TestVibePreview_HeadlessE2E$' -v ./...

  mobile-typecheck:
    name: mobile typecheck (vibe-preview client)
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - name: npm install
        working-directory: mobile
        # The repo uses --legacy-peer-deps everywhere because of RN's
        # peer-dep churn. Match that here.
        run: npm install --legacy-peer-deps
      - name: tsc --noEmit
        working-directory: mobile
        run: npx tsc --noEmit -p .

  web-typecheck:
    name: web typecheck (vibe-preview view)
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: npm install
        working-directory: web
        run: npm install --legacy-peer-deps
      - name: tsc --noEmit
        working-directory: web
        run: npx tsc --noEmit
