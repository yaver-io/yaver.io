#:schema node_modules/wrangler/config-schema.json

name = "yaver-io"
main = ".open-next/worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Route worker to yaver.io (domain already on Cloudflare DNS)
routes = [
  { pattern = "yaver.io/*", zone_name = "yaver.io" },
  { pattern = "www.yaver.io/*", zone_name = "yaver.io" },
]

[vars]
CONVEX_SITE_URL = "https://perceptive-minnow-557.eu-west-1.convex.site"
NEXT_PUBLIC_BASE_URL = "https://yaver.io"
