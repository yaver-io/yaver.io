AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Launch a Yaver-ready dev box on AWS EC2. After the stack reaches
  CREATE_COMPLETE, the box's yaver agent comes online under your Yaver
  user account and your local claude-code / codex / opencode credentials
  are mirrored to it automatically. The "yaver.io/launch" portal generates
  a Launch-Stack URL that pre-fills the UserCode parameter so end-users
  click once, paste / accept, and never touch a terminal.
#
# Usage from the portal (single click):
#   https://console.aws.amazon.com/cloudformation/home?#/stacks/new
#     ?templateURL=https://yaver.io/infra/cloudformation/yaver-launch.yaml
#     &param_UserCode=<6-char code from yaver.io/launch>
#
# Usage from the CLI:
#   aws cloudformation create-stack --stack-name yaver \
#     --template-url https://yaver.io/infra/cloudformation/yaver-launch.yaml \
#     --parameters ParameterKey=UserCode,ParameterValue=<code>

Parameters:
  UserCode:
    Type: String
    Description: >
      6-character device-code generated by yaver.io/launch. The box uses
      it to claim itself under your Yaver account on first boot. The
      code expires after 15 min, so launch the stack soon after generating.
    AllowedPattern: '^[A-Z0-9]{6}$'
    MinLength: 6
    MaxLength: 6
    ConstraintDescription: "Must be a 6-character uppercase alphanumeric code from yaver.io/launch"

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.small   # arm64, cheapest viable
      - t4g.medium
      - t3.small    # amd64
      - t3.medium
    Description: EC2 instance type. t4g.* are arm64 (Graviton, cheaper); t3.* are amd64.

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: SSH key pair name. Required for SSH access. Create one in EC2 → Key Pairs first.

  ConvexSiteURL:
    Type: String
    Default: 'https://perceptive-minnow-557.convex.cloud'
    Description: >
      Yaver's Convex deployment URL. The default is the production deployment;
      override only if you're running a self-hosted Yaver Convex.

Mappings:
  # AMI ids resolved from cloud-images.json by the launch portal at build
  # time. The portal serves this template with the Mappings table already
  # populated for the user's region. The empty defaults below let `aws
  # cloudformation create-stack` work after a manual edit.
  ArchByInstanceType:
    t4g.small:    { Arch: arm64 }
    t4g.medium:   { Arch: arm64 }
    t3.small:     { Arch: amd64 }
    t3.medium:    { Arch: amd64 }

  # Filled in by the portal. As of 2026-05-28 the manifest is all-nulls
  # so the template falls back to the latest Ubuntu 24.04 SSM parameter
  # via AWS::SSM::Parameter::Value below.
  YaverAMIByRegion:
    us-east-1:      { arm64: '', amd64: '' }
    us-west-2:      { arm64: '', amd64: '' }
    eu-central-1:   { arm64: '', amd64: '' }
    eu-west-1:      { arm64: '', amd64: '' }
    ap-southeast-1: { arm64: '', amd64: '' }
    ap-northeast-1: { arm64: '', amd64: '' }

Conditions:
  HasYaverAMI: !Not
    - !Equals
      - !FindInMap
        - YaverAMIByRegion
        - !Ref AWS::Region
        - !FindInMap [ArchByInstanceType, !Ref InstanceType, Arch]
      - ''

Resources:
  # When the Yaver AMI isn't published for this region yet, fall back to
  # the canonical Ubuntu 24.04 image from SSM and rely on cloud-init to
  # install yaver-cli at first boot (~3 min slower than the AMI path).
  UbuntuFallbackAMI:
    Type: AWS::SSM::Parameter
    Condition: HasYaverAMI
    Properties:
      Name: !Sub "/yaver/launch/${AWS::StackName}/placeholder"
      Type: String
      Value: 'unused-when-yaver-ami-present'

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Yaver agent ingress
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH
        - IpProtocol: tcp
          FromPort: 18080
          ToPort: 18080
          CidrIp: 0.0.0.0/0
          Description: Yaver agent HTTP
        - IpProtocol: udp
          FromPort: 4433
          ToPort: 4433
          CidrIp: 0.0.0.0/0
          Description: Yaver QUIC (direct device-to-device)

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyName
      SecurityGroups: [!Ref SecurityGroup]
      ImageId: !If
        - HasYaverAMI
        - !FindInMap
          - YaverAMIByRegion
          - !Ref AWS::Region
          - !FindInMap [ArchByInstanceType, !Ref InstanceType, Arch]
        - '{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp2/ami-id}}'
      Tags:
        - Key: Name
          Value: !Sub "yaver-${AWS::StackName}"
        - Key: managed-by
          Value: yaver-launch
      UserData:
        Fn::Base64: !Sub |
          #cloud-config
          # Yaver Launch — pending-auth.json embeds the (already
          # authorized) device-code so the box claims itself on first
          # boot. Same flow as `yaver launch aws`.
          package_update: true
          packages:
            - curl
            - git
            - jq
            - ca-certificates
            - tmux
          write_files:
            - path: /etc/yaver/pending-auth.json
              permissions: '0600'
              owner: root:root
              content: |
                {
                  "deviceCode": "${UserCode}",
                  "userCode": "${UserCode}",
                  "url": "(authorized via CloudFormation)",
                  "convexUrl": "${ConvexSiteURL}",
                  "expiresAt": 0,
                  "createdAt": 0
                }
            - path: /usr/local/lib/yaver/cloud-install.sh
              permissions: '0755'
              owner: root:root
              content: |
                #!/usr/bin/env bash
                set -euo pipefail
                if ! id yaver >/dev/null 2>&1; then
                  useradd --create-home --shell /bin/bash --comment "Yaver agent" yaver
                fi
                if ! command -v node >/dev/null 2>&1; then
                  curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
                  apt-get install -y nodejs
                fi
                if ! command -v yaver >/dev/null 2>&1; then
                  npm install -g yaver-cli
                fi
                install -d -m 0700 -o yaver -g yaver /home/yaver/.yaver
                install -m 0600 -o yaver -g yaver /etc/yaver/pending-auth.json \
                  /home/yaver/.yaver/pending-auth.json
                sudo -iu yaver bash -lc \
                  "tmux kill-session -t yaver 2>/dev/null || true; \
                   tmux new-session -d -s yaver \"yaver auth --headless --background-wait --convex-url '${ConvexSiteURL}' && exec yaver serve --port 18080 --debug\""
          runcmd:
            - bash /usr/local/lib/yaver/cloud-install.sh

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref Instance
  PublicIp:
    Description: Public IPv4 — SSH here with the KeyPair you selected
    Value: !GetAtt Instance.PublicIp
  AgentURL:
    Description: Yaver agent HTTP base URL (visible to your mobile + CLI for ~90s after launch)
    Value: !Sub "http://${Instance.PublicIp}:18080"
  WhatsNext:
    Description: How to verify the box claimed itself
    Value: !Sub >
      Open the Yaver app on your phone, sign in with the same account
      that generated UserCode at yaver.io/launch. The new device row
      should appear within ~2 min of CREATE_COMPLETE. Or run
      `yaver devices` from any other Yaver-installed machine.
