# XcodeGen spec for the YaverWatch watchOS app. Generate with:
#   cd watch && xcodegen generate
# Keeps the .xcodeproj reproducible + out of git (see watch/.gitignore) — edit
# this spec, not the project. See watch/README.md.
#
# This mirrors tvos/project.yml. The watch is a standalone XcodeGen project,
# NOT an Expo plugin / RN target — watchOS does not run React Native and the
# wrist surface shares almost nothing with the touch-first RN app. See
# docs/yaver-smartwatch-voice-terminal.md §6.
name: YaverWatch
options:
  deploymentTarget:
    watchOS: "10.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.40.0"
settings:
  base:
    SWIFT_VERSION: "5.0"          # avoid Swift 6 strict-concurrency churn for the scaffold
    DEVELOPMENT_TEAM: "5SJZ4KA39A"
    TARGETED_DEVICE_FAMILY: "4"   # watchOS
targets:
  YaverWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: YaverWatch
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.yaver.watch
        PRODUCT_NAME: Yaver
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: YaverWatch/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
